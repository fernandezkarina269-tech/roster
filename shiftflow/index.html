<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamArt V112 - REFINED LAYOUT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --bg: #f8fafc;
            --accent: #1e293b;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --border: #e2e8f0;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 5px 15px -5px rgba(0, 0, 0, 0.03);
            --card-radius: 20px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--slate-900);
            padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .hidden {
            display: none !important;
        }

        /* LOGIN */
        #view-login {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, #1e293b, #090e1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 32px;
            text-align: center;
            width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            color: white;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            color: var(--slate-900);
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* BUTTONS */
        .btn-main {
            padding: 16px 24px;
            width: 100%;
            background: linear-gradient(135deg, #FFD700, #FDB931);
            color: #000;
            border: none;
            font-weight: 800;
            cursor: pointer;
            border-radius: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(253, 185, 49, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(253, 185, 49, 0.3);
        }

        .btn-nav {
            width: auto !important;
            padding: 10px 18px !important;
            margin: 0 !important;
            font-size: 13px !important;
        }

        /* NAV */
        .nav {
            background: #000;
            color: #fff;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* POD CARDS & TABLES */
        .pod-card {
            background: white;
            border-radius: var(--card-radius);
            margin: 30px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .pod-header {
            padding: 18px 24px;
            font-weight: 800;
            font-size: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.2px;
        }

        .table-wrap {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
            min-width: 1000px;
        }

        th {
            background: #0f172a;
            color: rgba(255, 255, 255, 0.9);
            padding: 14px 10px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 16px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            transition: background 0.1s;
        }

        /* COLUMN WIDTHS */
        .col-sticky { width: 120px; }

        /* STICKY COLUMNS */
        .sc-sticky {
            position: sticky;
            z-index: 20;
            background: #fff !important;
        }
        .sc-1 { left: 0; border-right: 1px solid var(--border); width: 100px; }
        .sc-2 { left: 100px; border-right: 2px solid #cbd5e1; width: 140px; }

        th.sc-sticky { background: #0f172a !important; z-index: 30; }

        /* STATUS BADGES */
        .st-WORKING { color: #10b981; font-weight: 950; font-size: 18px; }
        .st-OFF { color: #f97316; font-weight: 800; font-size: 13px; }
        .st-SICK { color: #8b5cf6; font-weight: 800; font-size: 13px; }
        .st-ABSENT { color: #ef4444; font-weight: 900; font-size: 13px; }

        /* TABS */
        .shift-tabs {
            display: flex;
            background: #fff;
            padding: 12px 30px;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 72px;
            z-index: 900;
            align-items: center;
        }

        .shift-tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            color: #64748b;
            transition: all 0.2s;
            border: 1px solid transparent;
            text-transform: uppercase;
        }

        .shift-tab.active {
            background: var(--slate-900);
            color: #fff;
        }

        /* MODALS */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
        }

        /* HISTORY */
        .hist-item {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
        }
        .hist-time { color: #94a3b8; font-weight: 800; margin-bottom: 4px; display: block; }
        .hist-desc { font-weight: 600; color: var(--slate-800); line-height: 1.4; }
        .hist-user { color: #3b82f6; font-weight: 900; }
    </style>
</head>

<body>

    <div id="view-login">
        <div class="login-card">
            <h1>ShiftFlow</h1>
            <p style="font-weight:900; color:#10b981; font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:30px;">Premium Dashboard</p>
            <input type="password" id="pass-in" placeholder="ACCESS PIN">
            <button class="btn-main" onclick="startApp()">Enter System</button>
            <button class="btn-main btn-reset" style="background:#fff; border:1px solid #ef4444; color:#ef4444; margin-top:15px; font-weight:700;" onclick="hardReset()">Factory Reset</button>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <div class="nav">
            <div style="display:flex; align-items:center; gap:24px;">
                <div style="font-weight:950; letter-spacing:-0.5px; font-size:20px;">DREAMART</div>
                <div id="clock-display" style="font-family: 'JetBrains Mono', monospace; background:rgba(255,255,255,0.08); padding:6px 14px; border-radius:10px; font-size:14px; color:var(--gold); border: 1px solid rgba(255,255,255,0.1);">00:00:00</div>
            </div>
            <div style="display:flex; gap:12px;">
                <button class="btn-main btn-nav" style="background:#fff; color:#000;" onclick="downloadBackup()">📥 Backup</button>
                <button class="btn-main btn-nav btn-gold" onclick="askHistory()">📜 History</button>
                <button class="btn-main btn-nav btn-gold" onclick="showStats()">Statistics</button>
                <button class="btn-main btn-nav btn-gold" onclick="showAdd()">+ Member</button>
                <button class="btn-main btn-nav" style="background:#ef4444; color:#fff;" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="shift-tabs">
            <div style="display:flex; gap:8px;">
                <div class="shift-tab active" onclick="setShift('1st')">1st Shift</div>
                <div class="shift-tab" onclick="setShift('2nd')">2nd Shift</div>
                <div class="shift-tab" onclick="setShift('3rd')">3rd Shift</div>
            </div>
            <div style="flex:1;"></div>
            <div style="display:flex; gap:8px;">
                <button class="shift-tab" onclick="moveView(-7)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">« Week</button>
                <button class="shift-tab" onclick="moveView(-1)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">‹</button>
                <button class="shift-tab" onclick="resetView()" style="background:#f8fafc; color:#0f172a; border:1px solid #e2e8f0; padding:8px 18px;">TODAY</button>
                <button class="shift-tab" onclick="moveView(1)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">›</button>
                <button class="shift-tab" onclick="moveView(7)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">Week »</button>
            </div>
        </div>

        <div id="sheets-container" style="padding:0 10px;"></div>
    </div>

    <div id="modal-status" class="modal hidden">
        <div class="modal-box">
            <h2 id="target-name" style="margin-top:0; font-size:20px;"></h2>
            <div style="background:#fcfdfe; border:1px solid var(--border); padding:15px; border-radius:18px; margin-bottom:20px;">
                <label style="font-size:10px; font-weight:800; text-transform:uppercase; color:#64748b; display:block; text-align:left; margin-left:5px;">Daily Assignment Override:</label>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:5px;">
                    <input type="text" id="daily-team" placeholder="Daily Team" style="margin:0; padding:10px; font-size:12px;">
                    <input type="text" id="daily-model" placeholder="Daily Model" style="margin:0; padding:10px; font-size:12px;">
                </div>
            </div>
            <div id="cov-zone" class="hidden" style="background:#f0f9ff; padding:20px; border-radius:18px; margin-bottom:20px; border:1px solid #bae6fd;">
                <label style="font-size:11px; font-weight:800; text-transform:uppercase; color:#0369a1; display:block; margin-bottom:10px;">Who are they covering?</label>
                <select id="cov-select"></select>
                <button class="btn-main" style="background:#0284c7; margin-top:10px;" onclick="confirmCov()">Confirm Coverage</button>
            </div>
            <div id="sick-zone" class="hidden" style="background:#f5f3ff; padding:20px; border-radius:18px; margin-bottom:20px; border:1px solid #ddd6fe;">
                <label style="font-size:11px; font-weight:800; text-transform:uppercase; color:#6d28d9; display:block; margin-bottom:10px;">Expected Return Date:</label>
                <input type="date" id="sick-date">
                <button class="btn-main" style="background:#7c3aed; margin-top:10px;" onclick="confirmSick()">Save Sick Date</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <button class="btn-main" style="background:#10b981;" onclick="handleWorking()">Working (✓)</button>
                <button class="btn-main" style="background:#f97316;" onclick="saveSt('OFF')">Off</button>
                <button class="btn-main" style="background:#ef4444;" onclick="saveSt('ABSENT')">Absent</button>
                <button class="btn-main" style="background:#8b5cf6;" onclick="document.getElementById('sick-zone').classList.toggle('hidden')">Sick</button>
            </div>
            <div style="margin-top:25px; border-top:1px solid var(--border); padding-top:25px;">
                <label style="font-size:11px; font-weight:800; text-transform:uppercase; color:#64748b; display:block; margin-bottom:10px;">Daily Sales ($)</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="sale-amount" placeholder="0.00" style="margin:0;">
                    <button class="btn-main" style="width:auto; margin:0; background:var(--slate-900);" onclick="saveSale()">Save Sale</button>
                </div>
            </div>
            <button class="btn-main" style="margin-top:25px; border:none; background:#f1f5f9; color:#64748b;" onclick="closeM()">Cancel</button>
            <button class="btn-main" style="margin-top:10px; border:none; background:#f1f5f9; color:#3b82f6; font-size:11px;" onclick="editFromStatus()">🛠️ Edit Member Profile</button>
        </div>
    </div>

    <!-- MEMBER MODAL -->
    <div id="modal-add" class="modal hidden">
        <div class="modal-box">
            <h2 id="modal-title" style="margin-top:0;">Member Details</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="add-name" placeholder="Full Name">
            <input type="text" id="add-team" placeholder="Global Team (Default)">
            <input type="text" id="add-model" placeholder="Global Model (Default)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="add-pod">
                    <option value="A">POD A</option>
                    <option value="B">POD B</option>
                    <option value="F">POD F</option>
                    <option value="BACKUP">BACKUP</option>
                </select>
                <select id="add-shift">
                    <option value="1st">1st Shift</option>
                    <option value="2nd">2nd Shift</option>
                    <option value="3rd">3rd Shift</option>
                </select>
            </div>
            <select id="add-role">
                <option value="Chatter">Chatter</option>
                <option value="Shadower">Shadower</option>
                <option value="Backup">Backup</option>
            </select>
            <div style="text-align:left; margin-top:10px;">
                <label style="font-size:11px; font-weight:800; color:#64748b; margin-left:5px; text-transform:uppercase;">Joining Date:</label>
                <input type="date" id="add-start-date">
            </div>
            <button class="btn-main" onclick="doAdd()">Save Member</button>
            <button id="btn-delete" class="btn-main hidden" style="background:#ef4444; margin-top:10px;" onclick="doDelete()">Delete Member</button>
            <button class="btn-main" style="margin-top:15px; border:none; background:#f1f5f9; color:#64748b;" onclick="closeM()">Cancel</button>
        </div>
    </div>

    <!-- STATS MODAL -->
    <div id="modal-stats" class="modal hidden">
        <div class="modal-box" style="max-width: 500px;">
            <h2 style="margin-top:0;">System Statistics</h2>
            <div style="display:flex; gap:8px; margin-bottom:20px; justify-content:center;">
                <div class="shift-tab active" onclick="setStatsShift('ALL')" id="tab-all">All</div>
                <div class="shift-tab" onclick="setStatsShift('1st')" id="tab-1st">1st</div>
                <div class="shift-tab" onclick="setStatsShift('2nd')" id="tab-2nd">2nd</div>
                <div class="shift-tab" onclick="setStatsShift('3rd')" id="tab-3rd">3rd</div>
            </div>
            <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:16px; padding:15px; margin-bottom:20px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="date" id="stats-start">
                    <input type="date" id="stats-end">
                </div>
                <button class="btn-main" onclick="applyCustomStats()" style="margin-top:10px; font-size:12px;">Apply Filter</button>
            </div>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom:20px;">
                <div style="padding:15px 5px; background:#f0fdf4; border-radius:12px;"><div id="st-work" style="font-size:18px; font-weight:900; color:#16a34a;">0</div><div style="font-size:9px;">Work</div></div>
                <div style="padding:15px 5px; background:#fef2f2; border-radius:12px;"><div id="st-absent" style="font-size:18px; font-weight:900; color:#dc2626;">0</div><div style="font-size:9px;">Abs</div></div>
                <div style="padding:15px 5px; background:#f5f3ff; border-radius:12px;"><div id="st-sick" style="font-size:18px; font-weight:900; color:#7c3aed;">0</div><div style="font-size:9px;">Sick</div></div>
                <div style="padding:15px 5px; background:#fff7ed; border-radius:12px;"><div id="st-off" style="font-size:18px; font-weight:900; color:#ea580c;">0</div><div style="font-size:9px;">Off</div></div>
            </div>
            <div style="height:200px; margin-bottom:20px; border:1px solid var(--border); border-radius:12px; padding:10px;"><canvas id="salesChart"></canvas></div>
            <div id="st-sales-total" style="font-size:32px; font-weight:950;">$0.00</div>
            <button class="btn-main" style="margin-top:20px; background:var(--slate-900); color:#fff;" onclick="closeM()">Close</button>
        </div>
    </div>

    <!-- HISTORY MODAL -->
    <div id="modal-history" class="modal hidden">
        <div class="modal-box" style="max-width: 500px; padding:30px;">
            <h2 style="margin-top:0;">Change History Log</h2>
            <div id="hist-list" style="max-height: 400px; overflow-y: auto; background: #fff; border:1px solid var(--border); border-radius:16px;"></div>
            <button class="btn-main" style="background:var(--slate-900); color:#fff; margin-top:20px;" onclick="closeM()">Close History</button>
        </div>
    </div>

    <script>
        let db = { emps: [], sched: {}, sales: {}, notes: {}, history: [] };
        let act = null;
        let currentShift = '1st';
        let statsShift = 'ALL';
        let statsRange = { start: null, end: null };
        let viewOffset = parseInt(localStorage.getItem('SF_VIEW_OFFSET')) || -2;

        window.onerror = (msg) => alert("Error: " + msg);

        function logAction(desc) {
            if (!db.history) db.history = [];
            const user = prompt("Who is making this change? (Username Required)") || "User";
            const item = {
                time: new Date().toLocaleString('en-US', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }),
                user: user,
                desc: desc
            };
            db.history.unshift(item);
            if (db.history.length > 500) db.history = db.history.slice(0, 500);
            saveSilent();
        }

        function askHistory() { if (prompt("PIN:") === '0129') showHistory(); else alert("Denied"); }
        function showHistory() {
            const list = document.getElementById('hist-list');
            list.innerHTML = db.history?.length ? '' : '<div style="padding:40px; color:#94a3b8;">No history logs</div>';
            db.history.forEach(h => {
                list.innerHTML += `<div class="hist-item"><span class="hist-time">${h.time}</span><div class="hist-desc"><span class="hist-user">${h.user}:</span> ${h.desc}</div></div>`;
            });
            document.getElementById('modal-history').classList.remove('hidden');
        }

        function openM(id, k) {
            const e = db.emps.find(x => x.id == id); if (!e) return;
            act = { id, key: k, name: e.name, isoDate: getIsoDate(k) };
            const daily = db.sched[id]?.[k];
            document.getElementById('target-name').innerText = `${e.name} (${k})`;
            document.getElementById('daily-team').value = (typeof daily === 'object' ? daily.team : null) || e.team || "";
            document.getElementById('daily-model').value = (typeof daily === 'object' ? daily.model : null) || e.model || "";
            document.getElementById('sale-amount').value = db.sales?.[id]?.[act.isoDate] || "";
            document.getElementById('cov-zone').classList.add('hidden');
            document.getElementById('sick-zone').classList.add('hidden');
            document.getElementById('modal-status').classList.remove('hidden');
        }

        function saveSt(s) {
            if (!act) return;
            const team = document.getElementById('daily-team').value;
            const model = document.getElementById('daily-model').value;
            let finalStatus = (typeof s === 'string') ? { status: s } : s;
            finalStatus.team = team;
            finalStatus.model = model;
            if (!db.sched[act.id]) db.sched[act.id] = {};
            db.sched[act.id][act.key] = finalStatus;
            logAction(`Changed ${act.name} on ${act.key}: ${finalStatus.status} (Team: ${team})`);
            save();
        }

        function handleWorking() { saveSt('WORKING'); }
        function confirmCov() { saveSt({ status: 'ON', cov: document.getElementById('cov-select').value }); }
        function confirmSick() { saveSt({ status: 'SICK', date: document.getElementById('sick-date').value }); }

        function saveSale() {
            if (!act) return;
            const val = parseFloat(document.getElementById('sale-amount').value);
            if (!db.sales) db.sales = {}; if (!db.sales[act.id]) db.sales[act.id] = {};
            if (isNaN(val) || val <= 0) delete db.sales[act.id][act.isoDate]; else db.sales[act.id][act.isoDate] = val;
            logAction(`Saved sale for ${act.name}: $${val || 0}`);
            save(); alert("Saved!");
        }

        function doAdd() {
            const n = document.getElementById('add-name').value; if (!n) return alert("Missing name");
            const eid = document.getElementById('edit-id').value;
            const obj = { id: eid ? parseInt(eid) : Date.now(), name: n, team: document.getElementById('add-team').value, model: document.getElementById('add-model').value, pod: document.getElementById('add-pod').value, shift: document.getElementById('add-shift').value, role: document.getElementById('add-role').value, startDate: document.getElementById('add-start-date').value };
            if (eid) { const i = db.emps.findIndex(e => e.id == eid); db.emps[i] = obj; logAction(`Edit: ${n}`); }
            else { db.emps.push(obj); logAction(`Add: ${n}`); }
            save();
        }

        function editFromStatus() { if (act && act.id) { closeM(); editMember(act.id); } }
        function editMember(id) {
            const e = db.emps.find(x => x.id == id); if (!e) return;
            document.getElementById('modal-title').innerText = "Edit Member";
            document.getElementById('edit-id').value = e.id;
            document.getElementById('add-name').value = e.name;
            document.getElementById('add-team').value = e.team || "";
            document.getElementById('add-model').value = e.model || "";
            document.getElementById('add-pod').value = e.pod;
            document.getElementById('add-shift').value = e.shift;
            document.getElementById('add-role').value = e.role;
            document.getElementById('add-start-date').value = e.startDate || "";
            document.getElementById('btn-delete').classList.remove('hidden');
            document.getElementById('modal-add').classList.remove('hidden');
        }

        function showAdd() {
            document.getElementById('modal-title').innerText = "New Member";
            document.getElementById('edit-id').value = ""; document.getElementById('add-name').value = "";
            document.getElementById('btn-delete').classList.add('hidden');
            document.getElementById('modal-add').classList.remove('hidden');
        }

        function doDelete() {
            const e = db.emps.find(x => x.id == parseInt(document.getElementById('edit-id').value));
            if (confirm(`Wipe ${e.name}?`)) { db.emps = db.emps.filter(emp => emp.id !== e.id); logAction(`Delete: ${e.name}`); save(); }
        }

        function save() { localStorage.setItem('SF_V107_FINAL', JSON.stringify(db)); closeM(); render(); }
        function saveSilent() { localStorage.setItem('SF_V107_FINAL', JSON.stringify(db)); }
        function initData() {
            const saved = localStorage.getItem('SF_V107_FINAL'); if (saved) db = JSON.parse(saved);
            if (!db.history) db.history = [];
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            setInterval(updateClock, 1000); render();
        }

        function getViewDays() {
            const days = []; for (let i = 0; i < 7; i++) {
                const d = new Date(); d.setDate(d.getDate() + viewOffset + i);
                days.push(`${d.getDate()}/${d.getMonth() + 1}`);
            } return days;
        }
        function getIsoDate(dStr) {
            const [d, m] = dStr.split('/').map(Number);
            const today = new Date(); let y = today.getFullYear();
            const test = new Date(y, m - 1, d);
            if (Math.abs(test - today) > 15552000000) { if (test > today) y--; else y++; }
            return `${y}-${m.toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
        }
        function moveView(n) { viewOffset += n; localStorage.setItem('SF_VIEW_OFFSET', viewOffset); render(); }
        function resetView() { viewOffset = -2; localStorage.setItem('SF_VIEW_OFFSET', viewOffset); render(); }
        function setShift(s) { currentShift = s; render(); }
        function updateClock() { document.getElementById('clock-display').innerText = new Date().toLocaleTimeString('en-US', { hour12: false }); }
        function saveNote(pod, val) { if (!db.notes) db.notes = {}; db.notes[pod] = val; saveSilent(); }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }

        function render() {
            const container = document.getElementById('sheets-container');
            container.innerHTML = ''; const days = getViewDays();
            const todayStr = `${new Date().getDate()}/${new Date().getMonth() + 1}`;
            document.querySelectorAll('.active').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.shift-tab');
            if (currentShift === '1st') tabs[0].classList.add('active'); if (currentShift === '2nd') tabs[1].classList.add('active'); if (currentShift === '3rd') tabs[2].classList.add('active');
            const shiftEmps = db.emps.filter(e => e.shift === currentShift || (currentShift === '1st' && !e.shift));

            const makeCard = (title, emps, color) => {
                const podId = `${currentShift}-${title}`;
                let html = `
                <div class="pod-card">
                    <div class="pod-header" style="background:${color}15; color:${color};"><strong>${title}</strong></div>
                    <div style="padding:15px;"><textarea onblur="saveNote('${podId}', this.value)" style="height:40px;" placeholder="Notes...">${db.notes?.[podId] || ""}</textarea></div>
                    <div class="table-wrap">
                        <table><thead><tr>
                            <th class="sc-sticky sc-1">Team</th><th class="sc-sticky sc-2">Model</th>
                            ${days.map(d => `<th style="${d === todayStr ? 'background:#f97316;color:#fff;' : ''}">${d}</th>`).join('')}
                        </tr></thead><tbody>`;

                if (!emps.length) html += `<tr><td colspan="${2 + days.length}" style="padding:40px; color:#94a3b8;">Empty Pod</td></tr>`;
                else emps.forEach(e => {
                    html += `<tr>`;
                    const dayCells = days.map(d => {
                        const raw = db.sched[e.id]?.[d] || 'WORKING';
                        const st = typeof raw === 'object' ? raw.status : raw;
                        const iso = getIsoDate(d);
                        const sale = db.sales?.[e.id]?.[iso] ? `<div style="color:#10b981; margin-top:4px; font-weight:900;">$${db.sales[e.id][iso]}</div>` : '';
                        const dayTeam = (typeof raw === 'object' ? raw.team : null) || e.team || '-';
                        const dayModel = (typeof raw === 'object' ? raw.model : null) || e.model || '-';
                        return { dayTeam, dayModel, st, sale, d };
                    });
                    const todayData = dayCells.find(c => c.d === todayStr) || dayCells[0];
                    html += `<td class="sc-sticky sc-1" style="font-size:11px;">${todayData.dayTeam}</td>`;
                    html += `<td class="sc-sticky sc-2" style="font-size:11px;">${todayData.dayModel}</td>`;
                    dayCells.forEach(cell => {
                        html += `<td onclick="openM(${e.id},'${cell.d}')" style="cursor:pointer; ${cell.d === todayStr ? 'background:#fff7ed;' : ''}">
                            <div style="font-size:11px; font-weight:900; margin-bottom:5px; color:#0f172a;">${e.name}</div>
                            <div class="st-${cell.st}">${cell.st === 'WORKING' ? '✓' : cell.st}</div>
                            ${cell.dayTeam !== todayData.dayTeam ? `<div style="font-size:9px; color:#94a3b8;">(${cell.dayTeam})</div>` : ''}
                            ${cell.sale}
                        </td>`;
                    });
                    html += `</tr>`;
                });
                container.innerHTML += html + '</tbody></table></div></div>';
            };
            makeCard('POD A', shiftEmps.filter(e => e.pod === 'A'), '#3b82f6');
            makeCard('POD B', shiftEmps.filter(e => e.pod === 'B'), '#22c55e');
            makeCard('POD F', shiftEmps.filter(e => e.pod === 'F'), '#ef4444');
            makeCard('BACKUP', shiftEmps.filter(e => e.pod === 'BACKUP'), '#f59e0b');
        }

        function showStats() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('stats-start').value = statsRange.start || today;
            document.getElementById('stats-end').value = statsRange.end || today;
            updateStatsData(); document.getElementById('modal-stats').classList.remove('hidden');
        }
        function applyCustomStats() { statsRange.start = document.getElementById('stats-start').value; statsRange.end = document.getElementById('stats-end').value; updateStatsData(); }
        function setStatsShift(s) { statsShift = s; updateStatsData(); }
        function updateStatsData() {
            const startD = new Date(document.getElementById('stats-start').value + 'T00:00:00');
            const endD = new Date(document.getElementById('stats-end').value + 'T23:59:59');
            let w = 0, a = 0, s = 0, o = 0, revenue = 0;
            db.emps.forEach(emp => {
                if (statsShift !== 'ALL' && emp.shift !== statsShift) return;
                for (let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)) {
                    const key = `${d.getDate()}/${d.getMonth() + 1}`;
                    const raw = db.sched[emp.id]?.[key] || 'WORKING';
                    const st = (typeof raw === 'object') ? raw.status : raw;
                    if (st === 'WORKING') w++; else if (st === 'ABSENT') a++; else if (st === 'SICK') s++; else if (st === 'OFF') o++;
                }
                if (db.sales?.[emp.id]) Object.entries(db.sales[emp.id]).forEach(([iso, val]) => {
                    const d = new Date(iso + 'T12:00:00'); if (d >= startD && d <= endD) revenue += val;
                });
            });
            document.getElementById('st-work').innerText = w; document.getElementById('st-absent').innerText = a; document.getElementById('st-sick').innerText = s; document.getElementById('st-off').innerText = o;
            document.getElementById('st-sales-total').innerText = `$${revenue.toLocaleString()}`;
        }
        function downloadBackup() {
            const s = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const a = document.createElement('a'); a.href = s; a.download = `Backup_${new Date().toLocaleDateString()}.json`; a.click();
        }
        function startApp() { if (document.getElementById('pass-in').value === '0129') { localStorage.setItem('SF_LOGGED', 'true'); initData(); } else alert("PIN Error"); }
        function logout() { localStorage.removeItem('SF_LOGGED'); location.reload(); }
        function hardReset() { if (confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }
        if (localStorage.getItem('SF_LOGGED')) initData();
    </script>
</body>

</html>
