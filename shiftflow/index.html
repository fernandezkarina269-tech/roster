<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamArt V110 - PREMIUM & ALIGNED</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --bg: #f8fafc;
            --accent: #1e293b;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --border: #e2e8f0;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 5px 15px -5px rgba(0, 0, 0, 0.03);
            --card-radius: 20px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--slate-900);
            padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .hidden {
            display: none !important;
        }

        /* LOGIN */
        #view-login {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, #1e293b, #090e1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 32px;
            text-align: center;
            width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            color: white;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            color: var(--slate-900);
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .login-card input {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .login-card input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
        }

        /* BUTTONS */
        .btn-main {
            padding: 16px 24px;
            width: 100%;
            background: linear-gradient(135deg, #FFD700, #FDB931);
            color: #000;
            border: none;
            font-weight: 800;
            cursor: pointer;
            border-radius: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(253, 185, 49, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(253, 185, 49, 0.3);
        }

        .btn-main:active {
            transform: translateY(0);
        }

        /* NAV */
        .nav {
            background: #000;
            color: #fff;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* POD CARDS & TABLES */
        .pod-card {
            background: white;
            border-radius: var(--card-radius);
            margin: 30px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .pod-header {
            padding: 18px 24px;
            font-weight: 800;
            font-size: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.2px;
        }

        .table-wrap {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
            min-width: 1200px;
        }

        th {
            background: #0f172a;
            color: rgba(255, 255, 255, 0.9);
            padding: 14px 10px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 16px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            transition: background 0.1s;
        }

        /* COLUMN WIDTHS */
        .col-team { width: 80px; }
        .col-model { width: 100px; }
        .col-name { width: 220px; }
        .col-day { width: 120px; }

        /* STICKY COLUMNS */
        .sc-sticky {
            position: sticky;
            z-index: 20;
            background: #fff !important;
        }
        .sc-1 { left: 0; border-right: 1px solid var(--border); width: 80px; }
        .sc-2 { left: 80px; border-right: 1px solid var(--border); width: 100px; }
        .sc-3 { left: 180px; border-right: 2px solid #cbd5e1; width: 220px; text-align: left; padding-left: 20px; }

        th.sc-sticky { background: #0f172a !important; z-index: 30; }

        /* STATUS BADGES */
        .st-WORKING { color: #10b981; font-weight: 950; font-size: 18px; }
        .st-OFF { color: #f97316; font-weight: 800; font-size: 13px; }
        .st-SICK { color: #8b5cf6; font-weight: 800; font-size: 13px; }
        .st-ABSENT { color: #ef4444; font-weight: 900; font-size: 13px; }
        
        .st-subtext {
            display: block;
            font-size: 10.5px;
            font-weight: 700;
            margin-top: 5px;
            color: #64748b;
            line-height: 1.2;
        }
        
        .st-COV {
            background: #eff6ff;
            color: #2563eb;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            display: inline-block;
            margin-top: 5px;
            border: 1px solid #dbeafe;
        }

        /* TABS */
        .shift-tabs {
            display: flex;
            background: #fff;
            padding: 12px 30px;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 72px; /* Nav height */
            z-index: 900;
            align-items: center;
        }

        .shift-tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            color: #64748b;
            transition: all 0.2s;
            border: 1px solid transparent;
            text-transform: uppercase;
        }

        .shift-tab:hover:not(.active) {
            background: #f1f5f9;
            color: var(--slate-900);
        }

        .shift-tab.active {
            background: var(--slate-900);
            color: #fff;
        }

        .no-data {
            padding: 40px;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            background: #fcfdfe;
        }

        /* MODALS */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.25);
            border: 1px solid var(--border);
        }

        .btn-reset {
            background: #fff;
            border: 1px solid #ef4444;
            color: #ef4444;
            font-weight: 700;
            margin-top: 15px;
        }

        .btn-reset:hover {
            background: #fef2f2;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.1);
        }
    </style>
</head>

<body>

    <div id="view-login">
        <div class="login-card">
            <h1>ShiftFlow</h1>
            <p style="font-weight:900; color:#10b981; font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:30px;">Premium Dashboard</p>
            <input type="password" id="pass-in" placeholder="ACCESS PIN">
            <button class="btn-main" onclick="startApp()">Enter System</button>
            <button class="btn-main btn-reset" onclick="hardReset()">Factory Reset</button>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <div class="nav">
            <div style="display:flex; align-items:center; gap:24px;">
                <div style="font-weight:950; letter-spacing:-0.5px; font-size:20px;">DREAMART</div>
                <div id="clock-display" style="font-family: 'JetBrains Mono', monospace; background:rgba(255,255,255,0.08); padding:6px 14px; border-radius:10px; font-size:14px; color:var(--gold); border: 1px solid rgba(255,255,255,0.1);">00:00:00</div>
            </div>
            <div style="display:flex; gap:12px;">
                <button class="btn-main" style="width:auto; padding:10px 18px; margin:0; background:#fff; color:#000;" onclick="downloadBackup()">📥 Backup</button>
                <button class="btn-main btn-gold" style="width:auto; padding:10px 18px; margin:0;" onclick="showStats()">Statistics</button>
                <button class="btn-main btn-gold" style="width:auto; padding:10px 18px; margin:0;" onclick="showAdd()">+ Member</button>
                <button class="btn-main" style="width:auto; padding:10px 18px; margin:0; background:#ef4444; color:#fff;" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="shift-tabs">
            <div style="display:flex; gap:8px;">
                <div class="shift-tab active" onclick="setShift('1st')">1st Shift</div>
                <div class="shift-tab" onclick="setShift('2nd')">2nd Shift</div>
                <div class="shift-tab" onclick="setShift('3rd')">3rd Shift</div>
            </div>
            <div style="flex:1;"></div>
            <div style="display:flex; gap:8px;">
                <button class="shift-tab" onclick="moveView(-7)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">« Week</button>
                <button class="shift-tab" onclick="moveView(-1)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">‹</button>
                <button class="shift-tab" onclick="resetView()" style="background:#f8fafc; color:#0f172a; border:1px solid #e2e8f0; padding:8px 18px;">TODAY</button>
                <button class="shift-tab" onclick="moveView(1)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">›</button>
                <button class="shift-tab" onclick="moveView(7)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">Week »</button>
            </div>
        </div>

        <div id="sheets-container" style="padding:0 10px;"></div>
    </div>

    <!-- MODALS -->
    <div id="modal-status" class="modal hidden">
        <div class="modal-box">
            <h2 id="target-name" style="margin-top:0; font-size:20px;"></h2>
            <div id="cov-zone" class="hidden" style="background:#f0f9ff; padding:20px; border-radius:18px; margin-bottom:20px; border:1px solid #bae6fd;">
                <label style="font-size:11px; font-weight:800; text-transform:uppercase; color:#0369a1; display:block; margin-bottom:10px;">Who are they covering?</label>
                <select id="cov-select"></select>
                <button class="btn-main" style="background:#0284c7; margin-top:10px;" onclick="confirmCov()">Confirm Coverage</button>
            </div>
            <div id="sick-zone" class="hidden" style="background:#f5f3ff; padding:20px; border-radius:18px; margin-bottom:20px; border:1px solid #ddd6fe;">
                <label style="font-size:11px; font-weight:800; text-transform:uppercase; color:#6d28d9; display:block; margin-bottom:10px;">Expected Return Date:</label>
                <input type="date" id="sick-date">
                <button class="btn-main" style="background:#7c3aed; margin-top:10px;" onclick="confirmSick()">Save Sick Date</button>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <button class="btn-main" style="background:#10b981;" onclick="handleWorking()">Working (✓)</button>
                <button class="btn-main" style="background:#f97316;" onclick="saveSt('OFF')">Off</button>
                <button class="btn-main" style="background:#ef4444;" onclick="saveSt('ABSENT')">Absent</button>
                <button class="btn-main" style="background:#8b5cf6;" onclick="document.getElementById('sick-zone').classList.toggle('hidden')">Sick</button>
            </div>
            <div style="margin-top:25px; border-top:1px solid var(--border); padding-top:25px;">
                <label style="font-size:11px; font-weight:800; text-transform:uppercase; color:#64748b; display:block; margin-bottom:10px;">Daily Sales ($)</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="sale-amount" placeholder="0.00" style="margin:0;">
                    <button class="btn-main" style="width:auto; margin:0; background:var(--slate-900);" onclick="saveSale()">Save</button>
                </div>
            </div>
            <button class="btn-main btn-reset" style="margin-top:25px; border:none; background:#f1f5f9; color:#64748b;" onclick="closeM()">Cancel</button>
        </div>
    </div>

    <!-- MEMBER MODAL -->
    <div id="modal-add" class="modal hidden">
        <div class="modal-box">
            <h2 id="modal-title" style="margin-top:0;">New Member</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="add-name" placeholder="Full Name">
            <input type="text" id="add-team" placeholder="Team Name">
            <input type="text" id="add-model" placeholder="Model Name">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="add-pod">
                    <option value="A">POD A</option>
                    <option value="B">POD B</option>
                    <option value="F">POD F</option>
                    <option value="BACKUP">BACKUP</option>
                </select>
                <select id="add-shift">
                    <option value="1st">1st Shift</option>
                    <option value="2nd">2nd Shift</option>
                    <option value="3rd">3rd Shift</option>
                </select>
            </div>
            <select id="add-role">
                <option value="Chatter">Chatter</option>
                <option value="Shadower">Shadower</option>
                <option value="Backup">Backup</option>
            </select>
            <div style="text-align:left; margin-top:10px;">
                <label style="font-size:11px; font-weight:800; color:#64748b; margin-left:5px; text-transform:uppercase;">Joining Date:</label>
                <input type="date" id="add-start-date">
            </div>
            <button class="btn-main" onclick="doAdd()">Save Member</button>
            <button id="btn-delete" class="btn-main hidden" style="background:#ef4444; margin-top:10px;" onclick="doDelete()">Delete Member</button>
            <button class="btn-main btn-reset" style="margin-top:15px; border:none; background:#f1f5f9; color:#64748b;" onclick="closeM()">Cancel</button>
        </div>
    </div>

    <!-- STATS MODAL -->
    <div id="modal-stats" class="modal hidden">
        <div class="modal-box" style="max-width: 500px;">
            <h2 style="margin-top:0;">Performance Overview</h2>
            
            <div style="display:flex; gap:8px; margin-bottom:20px; justify-content:center;">
                <div class="shift-tab active" onclick="setStatsShift('ALL')" id="tab-all">All</div>
                <div class="shift-tab" onclick="setStatsShift('1st')" id="tab-1st">1st</div>
                <div class="shift-tab" onclick="setStatsShift('2nd')" id="tab-2nd">2nd</div>
                <div class="shift-tab" onclick="setStatsShift('3rd')" id="tab-3rd">3rd</div>
            </div>

            <!-- DATE FILTER -->
            <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:16px; padding:15px; margin-bottom:20px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div>
                        <label style="font-size:9px; font-weight:800; color:#64748b; text-transform:uppercase; display:block; text-align:left; margin-bottom:5px; margin-left:5px;">From:</label>
                        <input type="date" id="stats-start" style="margin:0; padding:8px 12px; font-size:12px;">
                    </div>
                    <div>
                        <label style="font-size:9px; font-weight:800; color:#64748b; text-transform:uppercase; display:block; text-align:left; margin-bottom:5px; margin-left:5px;">To:</label>
                        <input type="date" id="stats-end" style="margin:0; padding:8px 12px; font-size:12px;">
                    </div>
                </div>
                <button class="btn-main" style="padding:10px; font-size:12px; margin-top:10px; background:var(--slate-900); color:white;" onclick="applyCustomStats()">Filter Custom Range</button>
            </div>

            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom:30px;">
                <div style="padding:15px 5px; background:#f0fdf4; border:1px solid #bbfcce; border-radius:16px;">
                    <div id="st-work" style="font-size:20px; font-weight:900; color:#16a34a;">0</div>
                    <div style="font-size:9px; font-weight:800; color:#16a34a; text-transform:uppercase;">Working</div>
                </div>
                <div style="padding:15px 5px; background:#fef2f2; border:1px solid #fee2e2; border-radius:16px;">
                    <div id="st-absent" style="font-size:20px; font-weight:900; color:#dc2626;">0</div>
                    <div style="font-size:9px; font-weight:800; color:#dc2626; text-transform:uppercase;">Absent</div>
                </div>
                <div style="padding:15px 5px; background:#f5f3ff; border:1px solid #ddd6fe; border-radius:16px;">
                    <div id="st-sick" style="font-size:20px; font-weight:900; color:#7c3aed;">0</div>
                    <div style="font-size:9px; font-weight:800; color:#7c3aed; text-transform:uppercase;">Sick</div>
                </div>
                <div style="padding:15px 5px; background:#fff7ed; border:1px solid #ffedd5; border-radius:16px;">
                    <div id="st-off" style="font-size:20px; font-weight:900; color:#ea580c;">0</div>
                    <div style="font-size:9px; font-weight:800; color:#ea580c; text-transform:uppercase;">Off</div>
                </div>
            </div>

            <div style="height:220px; margin-bottom:30px; border:1px solid var(--border); border-radius:16px; padding:15px;">
                <canvas id="salesChart"></canvas>
            </div>

            <div style="text-align:center;">
                <div style="font-size:11px; font-weight:800; color:#64748b; text-transform:uppercase; margin-bottom:5px;">Total Revenue</div>
                <div id="st-sales-total" style="font-size:36px; font-weight:950; color:var(--slate-900);">$0.00</div>
            </div>
            
            <div style="display:flex; gap:5px; margin-top:20px; justify-content:center;">
                <button class="shift-tab" style="font-size:10px; background:#f1f5f9;" onclick="filterStatsPreset(0)">Today</button>
                <button class="shift-tab" style="font-size:10px; background:#f1f5f9;" onclick="filterStatsPreset(7)">7D</button>
                <button class="shift-tab" style="font-size:10px; background:#f1f5f9;" onclick="filterStatsPreset(14)">14D</button>
                <button class="shift-tab" style="font-size:10px; background:#f1f5f9;" onclick="filterStatsPreset(30)">30D</button>
            </div>

            <button class="btn-main" style="margin-top:30px; background:var(--slate-900); color:#fff;" onclick="closeM()">Close Statistics</button>
        </div>
    </div>

    <script>
        // GLOBAL STATE
        let db = { emps: [], sched: {}, sales: {}, notes: {}, goals: {} };
        let act = null;
        let salesChartInst = null;
        let currentShift = '1st';
        let statsShift = 'ALL';
        let statsRange = { start: null, end: null };
        let viewOffset = parseInt(localStorage.getItem('SF_VIEW_OFFSET')) || -2;

        window.onerror = (msg) => alert("Error: " + msg);

        // STICKY ACTIONS
        function openM(id, k) {
            const e = db.emps.find(x => x.id == id);
            if (!e) return;
            act = { id, key: k, name: e.name, isoDate: getIsoDate(k) };

            document.getElementById('target-name').innerText = e.name;
            const amount = db.sales?.[id]?.[act.isoDate] || "";
            document.getElementById('sale-amount').value = amount;

            document.getElementById('cov-zone').classList.add('hidden');
            document.getElementById('sick-zone').classList.add('hidden');
            document.getElementById('modal-status').classList.remove('hidden');
        }

        function saveSt(s) {
            if (!act) return;
            if (s === 'ABSENT') {
                const admin = prompt("Enter your name to confirm absence:");
                if (!admin) return;
                s = { status: 'ABSENT', resolver: admin };
            }
            if (!db.sched[act.id]) db.sched[act.id] = {};
            db.sched[act.id][act.key] = s;
            save();
        }

        function handleWorking() {
            const me = db.emps.find(e => e.id == act.id);
            if (!me) return;
            if (me.role !== 'Backup' && me.pod !== 'BACKUP') {
                saveSt('WORKING'); return;
            }
            const others = db.emps.filter(e => e.id != act.id);
            const targets = others.filter(o => {
                const stRaw = db.sched[o.id]?.[act.key];
                const st = (typeof stRaw === 'object') ? stRaw.status : stRaw;
                return ['SICK', 'ABSENT', 'OFF'].includes(st);
            });

            const sel = document.getElementById('cov-select');
            sel.innerHTML = '<option value="">-- NO COVERAGE --</option>';
            sel.innerHTML += '<option value="Empty Slot">EMPTY SLOT</option>';
            targets.forEach(t => sel.innerHTML += `<option value="${t.name}">${t.name} (${t.pod})</option>`);
            document.getElementById('cov-zone').classList.remove('hidden');
        }

        function confirmCov() {
            const val = document.getElementById('cov-select').value;
            saveSt(val ? { status: 'ON', cov: val } : 'WORKING');
        }

        function confirmSick() {
            const d = document.getElementById('sick-date').value;
            if (!d) return alert("Select date");
            const admin = prompt("Authorized by:");
            if (!admin) return;
            saveSt({ status: 'SICK', date: d, resolver: admin });
        }

        function saveSale() {
            if (!act) return;
            const val = parseFloat(document.getElementById('sale-amount').value);
            if (!db.sales) db.sales = {};
            if (!db.sales[act.id]) db.sales[act.id] = {};
            if (isNaN(val) || val <= 0) delete db.sales[act.id][act.isoDate];
            else db.sales[act.id][act.isoDate] = val;
            save();
            alert("Sale Saved!");
        }

        // UTILS
        function fmtDate(iso) {
            if (!iso) return "";
            const [y, m, d] = iso.split('-');
            return `${d}/${m}/${y}`;
        }

        function getViewDays() {
            const days = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + viewOffset + i);
                days.push(`${d.getDate()}/${d.getMonth() + 1}`);
            }
            return days;
        }

        function getIsoDate(dStr) {
            const [d, m] = dStr.split('/').map(Number);
            const today = new Date();
            let y = today.getFullYear();
            const test = new Date(y, m - 1, d);
            if (Math.abs(test - today) > 15552000000) { if (test > today) y--; else y++; }
            return `${y}-${m.toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
        }

        function moveView(n) { viewOffset += n; localStorage.setItem('SF_VIEW_OFFSET', viewOffset); render(); }
        function resetView() { viewOffset = -2; localStorage.setItem('SF_VIEW_OFFSET', viewOffset); render(); }

        function setShift(s) {
            currentShift = s;
            render();
        }

        function initData() {
            const saved = localStorage.getItem('SF_V107_FINAL');
            if (saved) db = JSON.parse(saved);
            if (!db.version) db.version = "110";
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            setInterval(updateClock, 1000);
            render();
        }

        function updateClock() {
            const el = document.getElementById('clock-display');
            if (el) el.innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
        }

        function save() { localStorage.setItem('SF_V107_FINAL', JSON.stringify(db)); closeM(); render(); }
        function saveNote(pod, val) { if (!db.notes) db.notes = {}; db.notes[pod] = val; localStorage.setItem('SF_V107_FINAL', JSON.stringify(db)); }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }

        // RENDERING
        function render() {
            const container = document.getElementById('sheets-container');
            container.innerHTML = '';
            const days = getViewDays();
            const todayStr = `${new Date().getDate()}/${new Date().getMonth() + 1}`;

            document.querySelectorAll('.shift-tab').forEach((t, i) => {
                const isShiftTab = i < 3;
                if(isShiftTab) {
                    const shifts = ['1st', '2nd', '3rd'];
                    t.classList.toggle('active', currentShift === shifts[i]);
                }
            });

            const shiftEmps = db.emps.filter(e => e.shift === currentShift || (currentShift === '1st' && !e.shift));

            const makeCard = (title, emps, label, color) => {
                const podId = `${currentShift}-${title}`;
                const goal = db.goals?.[podId] || 0;
                const note = db.notes?.[podId] || "";

                let html = `
                <div class="pod-card">
                    <div class="pod-header" style="background:${color}15;">
                        <span style="color:${color}; font-weight:900;">${title}</span>
                        <div onclick="editGoal('${podId}')" style="cursor:pointer; background:${color}10; color:${color}; padding:6px 14px; border-radius:10px; font-size:12px; font-weight:900; border:1px solid ${color}20;">
                            GOAL: $${goal} ✎
                        </div>
                    </div>
                    <div style="padding:15px 25px;">
                        <textarea placeholder="Shift notes..." onblur="saveNote('${podId}', this.value)" style="height:60px; margin:0; border:1px solid #e2e8f0; background:#fcfdfe;">${note}</textarea>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th class="sc-sticky sc-1 col-team">Team</th>
                                    <th class="sc-sticky sc-2 col-model">Model</th>
                                    <th class="sc-sticky sc-3 col-name">${label}</th>
                                    ${days.map(d => `<th class="col-day" style="${d === todayStr ? 'background:#f97316; color:#fff;' : ''}">${d}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>`;

                if (emps.length === 0) {
                    html += `<tr><td colspan="${3 + days.length}" class="no-data">No team members assigned to ${title} this shift.</td></tr>`;
                } else {
                    emps.forEach(e => {
                        html += `
                        <tr>
                            <td class="sc-sticky sc-1">${e.team || '-'}</td>
                            <td class="sc-sticky sc-2">${e.model || '-'}</td>
                            <td class="sc-sticky sc-3" onclick="editMember(${e.id})" style="cursor:pointer;">
                                <div style="font-weight:800; color:var(--slate-900);">${e.name}</div>
                                ${e.startDate ? `<div style="font-size:10px; color:#64748b; margin-top:2px;">Joined: ${fmtDate(e.startDate)}</div>` : ''}
                            </td>
                            ${days.map(d => {
                                const stRaw = db.sched[e.id]?.[d] || 'WORKING';
                                const st = (typeof stRaw === 'object') ? stRaw.status : stRaw;
                                let icon = '✓', cls = 'st-WORKING', sub = '';
                                if (st === 'OFF') { icon = 'OFF'; cls = 'st-OFF'; }
                                if (st === 'ABSENT') { icon = 'ABSENT'; cls = 'st-ABSENT'; if(stRaw.resolver) sub=`<span class="st-subtext">By: ${stRaw.resolver}</span>`; }
                                if (st === 'SICK') { icon = '🚑 SICK'; cls = 'st-SICK'; sub=`<span class="st-subtext">RTN: ${fmtDate(stRaw.date)}</span>`; }
                                if (st === 'ON') { icon = '✓'; if(stRaw.cov) sub=`<span class="st-COV">Cov: ${stRaw.cov}</span>`; }
                                
                                const iso = getIsoDate(d);
                                let saleSub = "";
                                if (db.sales?.[e.id]?.[iso]) saleSub = `<div style="color:#10b981; font-weight:900; font-size:11px; margin-top:4px;">$${db.sales[e.id][iso]}</div>`;

                                return `<td onclick="openM(${e.id},'${d}')" style="cursor:pointer; ${d === todayStr ? 'background:#fff7ed;' : ''}">
                                    <span class="${cls}">${icon}</span>
                                    ${sub}
                                    ${saleSub}
                                </td>`;
                            }).join('')}
                        </tr>`;
                    });
                }
                html += `</tbody></table></div></div>`;
                container.innerHTML += html;
            }

            makeCard('POD A', shiftEmps.filter(e => e.pod === 'A' && (!e.role || e.role === 'Chatter')), 'CHATTER', '#3b82f6');
            makeCard('POD B', shiftEmps.filter(e => e.pod === 'B' && (!e.role || e.role === 'Chatter')), 'CHATTER', '#22c55e');
            makeCard('POD F', shiftEmps.filter(e => e.pod === 'F' && (!e.role || e.role === 'Chatter')), 'CHATTER', '#ef4444');
            makeCard('BACKUP', shiftEmps.filter(e => e.role === 'Backup' || e.pod === 'BACKUP'), 'BACKUP', '#f59e0b');
            makeCard('SHADOWERS', shiftEmps.filter(e => e.role === 'Shadower'), 'SHADOWER', '#8b5cf6');
        }

        // STATS LOGIC
        function showStats() {
            if (!statsRange.start || !statsRange.end) {
                const today = new Date();
                statsRange.start = today.toISOString().split('T')[0];
                statsRange.end = today.toISOString().split('T')[0];
            }

            document.getElementById('stats-start').value = statsRange.start;
            document.getElementById('stats-end').value = statsRange.end;

            updateStatsData();
            document.getElementById('modal-stats').classList.remove('hidden');
        }

        function setStatsShift(s) {
            statsShift = s;
            ['tab-all', 'tab-1st', 'tab-2nd', 'tab-3rd'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById('tab-' + s.toLowerCase()).classList.add('active');
            updateStatsData();
        }

        function filterStatsPreset(daysBack) {
            const end = new Date();
            const start = new Date();
            start.setDate(end.getDate() - daysBack);
            
            statsRange.start = start.toISOString().split('T')[0];
            statsRange.end = end.toISOString().split('T')[0];
            
            document.getElementById('stats-start').value = statsRange.start;
            document.getElementById('stats-end').value = statsRange.end;
            
            updateStatsData();
        }

        function applyCustomStats() {
            statsRange.start = document.getElementById('stats-start').value;
            statsRange.end = document.getElementById('stats-end').value;
            if (!statsRange.start || !statsRange.end) return alert("Select both dates");
            updateStatsData();
        }

        function updateStatsData() {
            const startD = new Date(statsRange.start + 'T00:00:00');
            const endD = new Date(statsRange.end + 'T23:59:59');
            
            let w=0, o=0, a=0, s=0, totalRevenue = 0;
            const podSalesMap = { 'A': {}, 'B': {}, 'F': {} };
            const dateLabels = [];

            for (let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)) {
                const iso = d.toISOString().split('T')[0];
                const key = `${d.getDate()}/${d.getMonth() + 1}`;
                dateLabels.push({ iso, display: key });
                Object.keys(podSalesMap).forEach(p => podSalesMap[p][iso] = 0);
            }

            const relevantEmps = db.emps.filter(e => statsShift === 'ALL' || (e.shift || '1st') === statsShift);

            relevantEmps.forEach(emp => {
                for (let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)) {
                    const key = `${d.getDate()}/${d.getMonth() + 1}`;
                    const stRaw = db.sched[emp.id]?.[key] || 'WORKING';
                    const st = (typeof stRaw === 'object') ? stRaw.status : stRaw;
                    if (['WORKING', 'ON'].includes(st)) w++; 
                    else if (st === 'OFF') o++; 
                    else if (st === 'ABSENT') a++; 
                    else if (st === 'SICK') s++;
                }
                
                if (db.sales?.[emp.id]) {
                    Object.entries(db.sales[emp.id]).forEach(([iso, val]) => {
                        const d = new Date(iso + 'T12:00:00');
                        if (d >= startD && d <= endD) {
                            let p = emp.pod;
                            if (p === 'BACKUP' || emp.role === 'Backup') {
                                const key = `${d.getDate()}/${d.getMonth() + 1}`;
                                p = db.sched[emp.id]?.[key]?.cov ? (db.emps.find(x => x.name === db.sched[emp.id][key].cov)?.pod || 'A') : 'A';
                            }
                            if (podSalesMap[p]) podSalesMap[p][iso] += val;
                            totalRevenue += val;
                        }
                    });
                }
            });

            document.getElementById('st-work').innerText = w;
            document.getElementById('st-off').innerText = o;
            document.getElementById('st-absent').innerText = a;
            document.getElementById('st-sick').innerText = s;
            document.getElementById('st-sales-total').innerText = "$" + totalRevenue.toLocaleString(undefined, { minimumFractionDigits: 2 });

            renderComparisonChart(dateLabels, podSalesMap);
        }

        function renderComparisonChart(labels, dataMap) {
            const ctx = document.getElementById('salesChart').getContext('2d');
            if (salesChartInst) salesChartInst.destroy();
            
            salesChartInst = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.map(l => l.display),
                    datasets: [
                        { label: 'POD A', data: labels.map(l => dataMap['A'][l.iso] || 0), borderColor: '#3b82f6', tension: 0.4, fill: false, pointRadius: 2 },
                        { label: 'POD B', data: labels.map(l => dataMap['B'][l.iso] || 0), borderColor: '#22c55e', tension: 0.4, fill: false, pointRadius: 2 },
                        { label: 'POD F', data: labels.map(l => dataMap['F'][l.iso] || 0), borderColor: '#ef4444', tension: 0.4, fill: false, pointRadius: 2 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, 
                        x: { grid: { display : false }, ticks: { font: { size: 9 }, maxRotation: 45, minRotation: 45 } } 
                    } 
                }
            });
        }

        function showAdd() {
            document.getElementById('modal-title').innerText = "New Member"; document.getElementById('edit-id').value = "";
            ['add-name', 'add-team', 'add-model', 'add-start-date'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('add-pod').value = "A"; document.getElementById('add-shift').value = "1st"; document.getElementById('add-role').value = "Chatter";
            document.getElementById('btn-delete').classList.add('hidden'); document.getElementById('modal-add').classList.remove('hidden');
        }

        function editMember(id) {
            const e = db.emps.find(x => x.id === id); if (!e) return;
            document.getElementById('modal-title').innerText = "Edit Member"; document.getElementById('edit-id').value = e.id;
            document.getElementById('add-name').value = e.name; document.getElementById('add-team').value = e.team || "";
            document.getElementById('add-model').value = e.model || ""; document.getElementById('add-pod').value = e.pod || "A";
            document.getElementById('add-role').value = e.role || "Chatter"; document.getElementById('add-shift').value = e.shift || "1st";
            document.getElementById('add-start-date').value = e.startDate || "";
            document.getElementById('btn-delete').classList.remove('hidden'); document.getElementById('modal-add').classList.remove('hidden');
        }

        function doAdd() {
            const n = document.getElementById('add-name').value; if (!n) return alert("Name required");
            const eid = document.getElementById('edit-id').value;
            const obj = { name: n, team: document.getElementById('add-team').value, model: document.getElementById('add-model').value, pod: document.getElementById('add-pod').value, shift: document.getElementById('add-shift').value, role: document.getElementById('add-role').value, startDate: document.getElementById('add-start-date').value };
            if (eid) { const idx = db.emps.findIndex(e => e.id == eid); if (idx !== -1) Object.assign(db.emps[idx], obj); }
            else { obj.id = Date.now(); db.emps.push(obj); }
            save();
        }

        function doDelete() { const id = parseInt(document.getElementById('edit-id').value); if (confirm("Delete this member?")) { db.emps = db.emps.filter(e => e.id !== id); save(); } }
        function downloadBackup() {
            const s = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
            const a = document.createElement('a'); a.setAttribute("href", s); a.setAttribute("download", `ShiftFlow_Backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(a); a.click(); a.remove();
        }
        function startApp() { if (document.getElementById('pass-in').value === '0129') { localStorage.setItem('SF_LOGGED', 'true'); initData(); } else alert("PIN Error"); }
        function logout() { localStorage.removeItem('SF_LOGGED'); location.reload(); }
        function hardReset() { if (confirm("WIPE ALL DATA?")) { localStorage.clear(); location.reload(); } }
        function editGoal(podId) {
            const p = prompt("Admin PIN:"); if (p !== '0129') return;
            const res = prompt(`New goal for ${podId}:`, db.goals?.[podId] || 0);
            if (res !== null) { if (!db.goals) db.goals = {}; db.goals[podId] = parseFloat(res) || 0; save(); }
        }

        if (localStorage.getItem('SF_LOGGED')) initData();
    </script>
</body>

</html>
