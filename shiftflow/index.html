<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamArt V113 - SLOT-BASED GRID</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --bg: #f8fafc;
            --accent: #1e293b;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --border: #e2e8f0;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 5px 15px -5px rgba(0, 0, 0, 0.03);
            --card-radius: 20px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--slate-900);
            padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .hidden {
            display: none !important;
        }

        /* LOGIN */
        #view-login {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, #1e293b, #090e1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 32px;
            text-align: center;
            width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            color: white;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 14px;
            color: var(--slate-900);
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            box-sizing: border-box;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* BUTTONS */
        .btn-main {
            padding: 16px 24px;
            width: 100%;
            background: linear-gradient(135deg, #FFD700, #FDB931);
            color: #000;
            border: none;
            font-weight: 800;
            cursor: pointer;
            border-radius: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 15px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(253, 185, 49, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(253, 185, 49, 0.3);
        }

        .btn-nav {
            width: auto !important;
            padding: 10px 18px !important;
            margin: 0 !important;
            font-size: 13px !important;
        }

        /* NAV */
        .nav {
            background: #000;
            color: #fff;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* POD CARDS & TABLES */
        .pod-card {
            background: white;
            border-radius: var(--card-radius);
            margin: 30px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .pod-header {
            padding: 18px 24px;
            font-weight: 800;
            font-size: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.2px;
        }

        .table-wrap {
            overflow-x: auto;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
            min-width: 1000px;
        }

        th {
            background: #0f172a;
            color: rgba(255, 255, 255, 0.9);
            padding: 14px 10px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 16px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            transition: background 0.1s;
        }

        /* STICKY COLUMNS */
        .sc-sticky {
            position: sticky;
            z-index: 20;
            background: #fff !important;
        }

        .sc-1 {
            left: 0;
            border-right: 2px solid #cbd5e1;
            width: 100px;
        }

        th.sc-sticky {
            background: #0f172a !important;
            z-index: 30;
        }

        /* STATUS BADGES */
        .st-WORKING {
            color: #10b981;
            font-weight: 950;
            font-size: 18px;
        }

        .st-OFF {
            color: #f97316;
            font-weight: 800;
            font-size: 13px;
        }

        .st-SICK {
            color: #8b5cf6;
            font-weight: 800;
            font-size: 13px;
        }

        .st-ABSENT {
            color: #ef4444;
            font-weight: 900;
            font-size: 13px;
        }

        /* TABS */
        .shift-tabs {
            display: flex;
            background: #fff;
            padding: 12px 30px;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 72px;
            z-index: 900;
            align-items: center;
        }

        .shift-tab {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            color: #64748b;
            transition: all 0.2s;
            border: 1px solid transparent;
            text-transform: uppercase;
        }

        .shift-tab.active {
            background: var(--slate-900);
            color: #fff;
        }

        /* MODALS */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
        }

        /* HISTORY */
        .hist-item {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
        }

        .hist-time {
            color: #94a3b8;
            font-weight: 800;
            margin-bottom: 4px;
            display: block;
        }

        .hist-desc {
            font-weight: 600;
            color: var(--slate-800);
            line-height: 1.4;
        }

        .hist-user {
            color: #3b82f6;
            font-weight: 900;
        }

        /* SELECT CUSTOM */
        select.compact {
            padding: 10px;
            font-size: 12px;
            margin: 5px 0;
        }
    </style>
</head>

<body>

    <div id="view-login">
        <div class="login-card">
            <h1>ShiftFlow</h1>
            <p
                style="font-weight:900; color:#10b981; font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:30px;">
                Slot Grid Dashboard</p>
            <input type="password" id="pass-in" placeholder="ACCESS PIN">
            <button class="btn-main" onclick="startApp()">Enter System</button>
            <button class="btn-main btn-reset"
                style="background:#fff; border:1px solid #ef4444; color:#ef4444; margin-top:15px; font-weight:700;"
                onclick="hardReset()">Factory Reset</button>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <div class="nav">
            <div style="display:flex; align-items:center; gap:24px;">
                <div style="font-weight:950; letter-spacing:-0.5px; font-size:20px;">DREAMART</div>
                <div id="clock-display"
                    style="font-family: 'JetBrains Mono', monospace; background:rgba(255,255,255,0.08); padding:6px 14px; border-radius:10px; font-size:14px; color:var(--gold); border: 1px solid rgba(255,255,255,0.1);">
                    00:00:00</div>
            </div>
            <div style="display:flex; gap:12px;">
                <button class="btn-main btn-nav" style="background:#fff; color:#000;" onclick="downloadBackup()">📥
                    Backup</button>
                <button class="btn-main btn-nav btn-gold" onclick="askHistory()">📜 History</button>
                <button class="btn-main btn-nav btn-gold" onclick="showStats()">Statistics</button>
                <button class="btn-main btn-nav btn-gold" onclick="showAdd()">+ Member Pool</button>
                <button class="btn-main btn-nav" style="background:#ef4444; color:#fff;"
                    onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="shift-tabs">
            <div style="display:flex; gap:8px;">
                <div class="shift-tab active" onclick="setShift('1st')">1st Shift</div>
                <div class="shift-tab" onclick="setShift('2nd')">2nd Shift</div>
                <div class="shift-tab" onclick="setShift('3rd')">3rd Shift</div>
            </div>
            <div style="flex:1;"></div>
            <div style="display:flex; gap:8px;">
                <button class="shift-tab" onclick="moveView(-7)"
                    style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">« Week</button>
                <button class="shift-tab" onclick="moveView(-1)"
                    style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">‹</button>
                <button class="shift-tab" onclick="resetView()"
                    style="background:#f8fafc; color:#0f172a; border:1px solid #e2e8f0; padding:8px 18px;">TODAY</button>
                <button class="shift-tab" onclick="moveView(1)"
                    style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">›</button>
                <button class="shift-tab" onclick="moveView(7)"
                    style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">Week »</button>
            </div>
        </div>

        <div id="sheets-container" style="padding:0 10px;"></div>
    </div>

    <!-- ASSIGNMENT MODAL -->
    <div id="modal-status" class="modal hidden">
        <div class="modal-box">
            <h2 id="modal-slot-title" style="margin-top:0; font-size:20px;">Slot Assignment</h2>
            <p id="modal-date-label" style="font-size:12px; color:#64748b; font-weight:800;"></p>

            <div
                style="background:#fcfdfe; border:1px solid var(--border); padding:20px; border-radius:18px; margin-bottom:20px; text-align:left;">
                <label
                    style="font-size:10px; font-weight:900; text-transform:uppercase; color:#64748b; margin-bottom:5px; display:block;">Select
                    Employee:</label>
                <select id="grid-emp-select" class="compact"></select>

                <label
                    style="font-size:10px; font-weight:900; text-transform:uppercase; color:#64748b; margin-top:10px; margin-bottom:5px; display:block;">Assigned
                    Model:</label>
                <input type="text" id="grid-model-input" placeholder="e.g. Poison - Alana"
                    style="margin:0; padding:10px; font-size:12px;">
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <button class="btn-main" style="background:#10b981;" onclick="saveGridSt('WORKING')">Working
                    (✓)</button>
                <button class="btn-main" style="background:#f97316;" onclick="saveGridSt('OFF')">Off</button>
                <button class="btn-main" style="background:#ef4444;" onclick="saveGridSt('ABSENT')">Absent</button>
                <button class="btn-main" style="background:#8b5cf6;" onclick="saveGridSt('SICK')">Sick</button>
            </div>

            <div style="margin-top:25px; border-top:1px solid var(--border); padding-top:25px;">
                <label
                    style="font-size:11px; font-weight:800; text-transform:uppercase; color:#64748b; display:block; margin-bottom:10px;">Daily
                    Sales ($)</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="grid-sale-amount" placeholder="0.00" style="margin:0;">
                    <button class="btn-main" style="width:auto; margin:0; background:var(--slate-900);"
                        onclick="saveGridSale()">Save Sale</button>
                </div>
            </div>

            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn-main" style="border:none; background:#f1f5f9; color:#64748b;"
                    onclick="closeM()">Cancel</button>
                <button class="btn-main" style="border:none; background:#fef2f2; color:#ef4444;"
                    onclick="clearSlot()">Reset Slot</button>
            </div>
        </div>
    </div>

    <!-- MEMBER POOL MODAL -->
    <div id="modal-add" class="modal hidden">
        <div class="modal-box">
            <h2 id="modal-title" style="margin-top:0;">Member Details</h2>
            <div id="member-pool-list"
                style="max-height:200px; overflow-y:auto; border:1px solid var(--border); border-radius:12px; margin-bottom:20px; text-align:left; background:#f8fafc;">
                <!-- Filled via JS -->
            </div>
            <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
            <input type="hidden" id="edit-id">
            <input type="text" id="add-name" placeholder="Full Name">
            <input type="text" id="add-team" placeholder="Default Team (Optional)">
            <input type="text" id="add-model" placeholder="Default Model (Optional)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="add-pod">
                    <option value="A">POD A</option>
                    <option value="B">POD B</option>
                    <option value="F">POD F</option>
                    <option value="BACKUP">BACKUP</option>
                </select>
                <select id="add-shift">
                    <option value="1st">1st Shift</option>
                    <option value="2nd">2nd Shift</option>
                    <option value="3rd">3rd Shift</option>
                </select>
            </div>
            <button class="btn-main" onclick="doAdd()">Save to Pool</button>
            <button id="btn-delete" class="btn-main hidden" style="background:#ef4444; margin-top:10px;"
                onclick="doDelete()">Delete Member</button>
            <button class="btn-main" style="margin-top:15px; border:none; background:#f1f5f9; color:#64748b;"
                onclick="closeM()">Close</button>
        </div>
    </div>

    <!-- STATS MODAL -->
    <div id="modal-stats" class="modal hidden">
        <div class="modal-box" style="max-width: 500px;">
            <h2 style="margin-top:0;">System Statistics (Grid)</h2>
            <div style="display:flex; gap:8px; margin-bottom:20px; justify-content:center;">
                <div class="shift-tab active" onclick="setStatsShift('ALL')" id="tab-all">All</div>
                <div class="shift-tab" onclick="setStatsShift('1st')" id="tab-1st">1st</div>
                <div class="shift-tab" onclick="setStatsShift('2nd')" id="tab-2nd">2nd</div>
                <div class="shift-tab" onclick="setStatsShift('3rd')" id="tab-3rd">3rd</div>
            </div>
            <div
                style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:16px; padding:15px; margin-bottom:20px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="date" id="stats-start">
                    <input type="date" id="stats-end">
                </div>
                <button class="btn-main" onclick="applyCustomStats()" style="margin-top:10px; font-size:12px;">Apply
                    Filter</button>
            </div>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom:20px;">
                <div style="padding:15px 5px; background:#f0fdf4; border-radius:12px;">
                    <div id="st-work" style="font-size:18px; font-weight:900; color:#16a34a;">0</div>
                    <div style="font-size:9px;">Work</div>
                </div>
                <div style="padding:15px 5px; background:#fef2f2; border-radius:12px;">
                    <div id="st-absent" style="font-size:18px; font-weight:900; color:#dc2626;">0</div>
                    <div style="font-size:9px;">Abs</div>
                </div>
                <div style="padding:15px 5px; background:#f5f3ff; border-radius:12px;">
                    <div id="st-sick" style="font-size:18px; font-weight:900; color:#7c3aed;">0</div>
                    <div style="font-size:9px;">Sick</div>
                </div>
                <div style="padding:15px 5px; background:#fff7ed; border-radius:12px;">
                    <div id="st-off" style="font-size:18px; font-weight:900; color:#ea580c;">0</div>
                    <div style="font-size:9px;">Off</div>
                </div>
            </div>
            <div
                style="height:200px; margin-bottom:20px; border:1px solid var(--border); border-radius:12px; padding:10px;">
                <canvas id="salesChart"></canvas></div>
            <div id="st-sales-total" style="font-size:32px; font-weight:950;">$0.00</div>
            <button class="btn-main" style="margin-top:20px; background:var(--slate-900); color:#fff;"
                onclick="closeM()">Close</button>
        </div>
    </div>

    <!-- HISTORY MODAL -->
    <div id="modal-history" class="modal hidden">
        <div class="modal-box" style="max-width: 500px; padding:30px;">
            <h2 style="margin-top:0;">Change History Log</h2>
            <div id="hist-list"
                style="max-height: 400px; overflow-y: auto; background: #fff; border:1px solid var(--border); border-radius:16px;">
            </div>
            <button class="btn-main" style="background:var(--slate-900); color:#fff; margin-top:20px;"
                onclick="closeM()">Close History</button>
        </div>
    </div>

    <script>
        let db = { emps: [], grid: {}, history: [] };
        let activeSlot = null;
        let currentShift = '1st';
        let statsShift = 'ALL';
        let statsRange = { start: null, end: null };
        let viewOffset = parseInt(localStorage.getItem('SF_VIEW_OFFSET')) || -2;

        window.onerror = (msg) => alert("Error: " + msg);

        // LOGGING
        function logAction(desc) {
            if (!db.history) db.history = [];
            const user = "Karina"; // Hardcoded for simplified admin feel
            const item = {
                time: new Date().toLocaleString('en-US', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }),
                user: user,
                desc: desc
            };
            db.history.unshift(item);
            if (db.history.length > 500) db.history = db.history.slice(0, 500);
            saveSilent();
        }

        function askHistory() { if (prompt("PIN:") === '0129') showHistory(); else alert("Denied"); }
        function showHistory() {
            const list = document.getElementById('hist-list');
            list.innerHTML = db.history?.length ? '' : '<div style="padding:40px; color:#94a3b8;">No history logs</div>';
            db.history.forEach(h => {
                list.innerHTML += `<div class="hist-item"><span class="hist-time">${h.time}</span><div class="hist-desc"><span class="hist-user">${h.user}:</span> ${h.desc}</div></div>`;
            });
            document.getElementById('modal-history').classList.remove('hidden');
        }

        // GRID SLOTS
        function openGridM(pod, slotIdx, dateStr) {
            const dateKey = dateStr;
            const shiftKey = currentShift;
            activeSlot = { date: dateKey, shift: shiftKey, pod, index: slotIdx };

            const data = db.grid[dateKey]?.[shiftKey]?.[pod]?.[slotIdx] || {};

            document.getElementById('modal-slot-title').innerText = `${pod} - Slot ${slotIdx + 1}`;
            document.getElementById('modal-date-label').innerText = `Date: ${dateStr}`;

            // Fill Employee Dropdown
            const sel = document.getElementById('grid-emp-select');
            sel.innerHTML = '<option value="">-- No Employee --</option>';
            db.emps.sort((a, b) => a.name.localeCompare(b.name)).forEach(e => {
                const opt = document.createElement('option');
                opt.value = e.id;
                opt.text = e.name;
                if (e.id == data.empId) opt.selected = true;
                sel.add(opt);
            });

            document.getElementById('grid-model-input').value = data.model || "";
            document.getElementById('grid-sale-amount').value = data.sale || "";

            document.getElementById('modal-status').classList.remove('hidden');
        }

        function saveGridSt(st) {
            if (!activeSlot) return;
            const { date, shift, pod, index } = activeSlot;
            const empId = document.getElementById('grid-emp-select').value;
            const model = document.getElementById('grid-model-input').value;

            if (!db.grid[date]) db.grid[date] = {};
            if (!db.grid[date][shift]) db.grid[date][shift] = {};
            if (!db.grid[date][shift][pod]) db.grid[date][shift][pod] = {};

            const existing = db.grid[date][shift][pod][index] || {};
            db.grid[date][shift][pod][index] = {
                ...existing,
                empId,
                model,
                status: st
            };

            const empName = db.emps.find(e => e.id == empId)?.name || "Empty";
            logAction(`Assigned Slot: ${pod} #${index + 1} -> ${empName} (${st}) on ${date}`);
            save();
        }

        function saveGridSale() {
            if (!activeSlot) return;
            const { date, shift, pod, index } = activeSlot;
            const val = parseFloat(document.getElementById('grid-sale-amount').value);

            if (!db.grid[date]?.[shift]?.[pod]?.[index]) return alert("Assign an employee first!");

            db.grid[date][shift][pod][index].sale = isNaN(val) || val <= 0 ? 0 : val;
            logAction(`Saved sale for ${activeSlot.pod} slot ${activeSlot.index + 1}: $${val || 0}`);
            save(); alert("Saved!");
        }

        function clearSlot() {
            if (!activeSlot) return;
            const { date, shift, pod, index } = activeSlot;
            if (db.grid[date]?.[shift]?.[pod]) {
                delete db.grid[date][shift][pod][index];
                logAction(`Cleared Slot: ${pod} #${index + 1} on ${date}`);
                save();
            }
        }

        // MEMBER POOL
        function updatePoolList() {
            const list = document.getElementById('member-pool-list');
            list.innerHTML = "";
            db.emps.forEach(e => {
                const div = document.createElement('div');
                div.style = "padding:8px 12px; border-bottom:1px solid #e2e8f0; font-size:12px; cursor:pointer;";
                div.innerHTML = `<strong>${e.name}</strong> <span style="font-size:10px; color:#64748b;">(${e.pod} POD, ${e.role})</span>`;
                div.onclick = () => editMember(e.id);
                list.appendChild(div);
            });
        }

        function doAdd() {
            const n = document.getElementById('add-name').value; if (!n) return alert("Missing name");
            const eid = document.getElementById('edit-id').value;
            const obj = { id: eid ? parseInt(eid) : Date.now(), name: n, team: document.getElementById('add-team').value, model: document.getElementById('add-model').value, pod: document.getElementById('add-pod').value, shift: document.getElementById('add-shift').value, role: "Chatter" };
            if (eid) { const i = db.emps.findIndex(e => e.id == eid); db.emps[i] = obj; logAction(`Edit Pool: ${n}`); }
            else { db.emps.push(obj); logAction(`Add to Pool: ${n}`); }
            save(); updatePoolList();
        }

        function editMember(id) {
            const e = db.emps.find(x => x.id == id); if (!e) return;
            document.getElementById('edit-id').value = e.id;
            document.getElementById('add-name').value = e.name;
            document.getElementById('add-team').value = e.team || "";
            document.getElementById('add-model').value = e.model || "";
            document.getElementById('add-pod').value = e.pod;
            document.getElementById('add-shift').value = e.shift;
            document.getElementById('btn-delete').classList.remove('hidden');
        }

        function showAdd() {
            document.getElementById('edit-id').value = ""; document.getElementById('add-name').value = "";
            document.getElementById('btn-delete').classList.add('hidden');
            updatePoolList();
            document.getElementById('modal-add').classList.remove('hidden');
        }

        function doDelete() {
            const id = parseInt(document.getElementById('edit-id').value);
            if (confirm("Delete from Pool? History in grid remains as ID.")) {
                db.emps = db.emps.filter(emp => emp.id !== id);
                logAction("Deleted from Pool");
                save(); updatePoolList();
            }
        }

        // PERSISTENCE
        function save() { localStorage.setItem('SF_V113_GRID', JSON.stringify(db)); closeM(); render(); }
        function saveSilent() { localStorage.setItem('SF_V113_GRID', JSON.stringify(db)); }
        function initData() {
            const saved = localStorage.getItem('SF_V113_GRID');
            if (saved) db = JSON.parse(saved);
            else migrateFromOld(); // One-time migration attempt

            if (!db.grid) db.grid = {};
            if (!db.history) db.history = [];

            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            setInterval(updateClock, 1000); render();
        }

        function migrateFromOld() {
            const old = localStorage.getItem('SF_V107_FINAL');
            if (!old) return;
            const parsed = JSON.parse(old);
            db.emps = parsed.emps || [];
            db.history = parsed.history || [];
            db.grid = {};
            // Simplified migration: only emps for now to avoid mess
        }

        function getViewDays() {
            const days = []; for (let i = 0; i < 7; i++) {
                const d = new Date(); d.setDate(d.getDate() + viewOffset + i);
                days.push(`${d.getDate()}/${d.getMonth() + 1}`);
            } return days;
        }
        function getIsoDate(dStr) {
            const [d, m] = dStr.split('/').map(Number);
            const today = new Date(); let y = today.getFullYear();
            const test = new Date(y, m - 1, d);
            if (Math.abs(test - today) > 15552000000) { if (test > today) y--; else y++; }
            return `${y}-${m.toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
        }
        function moveView(n) { viewOffset += n; localStorage.setItem('SF_VIEW_OFFSET', viewOffset); render(); }
        function resetView() { viewOffset = -2; localStorage.setItem('SF_VIEW_OFFSET', viewOffset); render(); }
        function setShift(s) { currentShift = s; render(); }
        function updateClock() { document.getElementById('clock-display').innerText = new Date().toLocaleTimeString('en-US', { hour12: false }); }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); }

        // RENDERING GRID
        function render() {
            const container = document.getElementById('sheets-container');
            container.innerHTML = '';
            const days = getViewDays();
            const todayStr = `${new Date().getDate()}/${new Date().getMonth() + 1}`;

            document.querySelectorAll('.shift-tab').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.shift-tab');
            if (currentShift === '1st') tabs[0].classList.add('active');
            if (currentShift === '2nd') tabs[1].classList.add('active');
            if (currentShift === '3rd') tabs[2].classList.add('active');

            const makePodTable = (podTitle, slotCount, color) => {
                let html = `
                <div class="pod-card">
                    <div class="pod-header" style="background:${color}15; color:${color};"><strong>${podTitle}</strong></div>
                    <div class="table-wrap">
                        <table><thead><tr>
                            <th class="sc-sticky sc-1">Station</th>
                            ${days.map(d => `<th style="${d === todayStr ? 'background:#f97316;color:#fff;' : ''}">${d}</th>`).join('')}
                        </tr></thead><tbody>`;

                for (let i = 0; i < slotCount; i++) {
                    html += `<tr><td class="sc-sticky sc-1" style="font-size:11px; color:#64748b;">Slot ${i + 1}</td>`;
                    days.forEach(d => {
                        const data = db.grid[d]?.[currentShift]?.[podTitle]?.[i] || {};
                        const emp = db.emps.find(e => e.id == data.empId);
                        const empName = emp ? emp.name : `<span style="color:#cbd5e1;">Empty</span>`;
                        const model = data.model || "";
                        const st = data.status || "";
                        const sale = data.sale ? `<div style="color:#10b981; font-weight:900; font-size:12px;">$${data.sale}</div>` : "";

                        html += `<td onclick="openGridM('${podTitle}', ${i}, '${d}')" style="cursor:pointer; min-height:80px; ${d === todayStr ? 'background:#fff7ed;' : ''}">
                            <div style="font-size:11px; font-weight:900; color:#0f172a;">${empName}</div>
                            ${model ? `<div style="font-size:9px; color:#64748b; margin-top:2px;">${model}</div>` : ""}
                            ${st ? `<div class="st-${st}" style="margin-top:4px;">${st === 'WORKING' ? '✓' : st}</div>` : ""}
                            ${sale}
                        </td>`;
                    });
                    html += `</tr>`;
                }
                container.innerHTML += html + '</tbody></table></div></div>';
            };

            makePodTable('POD A', 10, '#3b82f6');
            makePodTable('POD B', 10, '#22c55e');
            makePodTable('POD F', 6, '#ef4444');
            makePodTable('BACKUP', 4, '#f59e0b');
        }

        // STATS
        function showStats() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('stats-start').value = statsRange.start || today;
            document.getElementById('stats-end').value = statsRange.end || today;
            updateStatsData(); document.getElementById('modal-stats').classList.remove('hidden');
        }
        function applyCustomStats() { statsRange.start = document.getElementById('stats-start').value; statsRange.end = document.getElementById('stats-end').value; updateStatsData(); }
        function setStatsShift(s) { statsShift = s; updateStatsData(); }
        function updateStatsData() {
            const startD = new Date(document.getElementById('stats-start').value + 'T00:00:00');
            const endD = new Date(document.getElementById('stats-end').value + 'T23:59:59');
            let w = 0, a = 0, s = 0, o = 0, revenue = 0;

            const days = [];
            for (let d = new Date(startD); d <= endD; d.setDate(d.getDate() + 1)) {
                days.push(`${d.getDate()}/${d.getMonth() + 1}`);
            }

            days.forEach(dKey => {
                const dayData = db.grid[dKey] || {};
                Object.entries(dayData).forEach(([shift, pods]) => {
                    if (statsShift !== 'ALL' && shift !== statsShift) return;
                    Object.values(pods).forEach(podSlots => {
                        Object.values(podSlots).forEach(slot => {
                            if (slot.status === 'WORKING') w++;
                            else if (slot.status === 'ABSENT') a++;
                            else if (slot.status === 'SICK') s++;
                            else if (slot.status === 'OFF') o++;
                            if (slot.sale) revenue += parseFloat(slot.sale);
                        });
                    });
                });
            });

            document.getElementById('st-work').innerText = w; document.getElementById('st-absent').innerText = a; document.getElementById('st-sick').innerText = s; document.getElementById('st-off').innerText = o;
            document.getElementById('st-sales-total').innerText = `$${revenue.toLocaleString()}`;
        }

        function downloadBackup() {
            const s = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const a = document.createElement('a'); a.href = s; a.download = `Backup_${new Date().toLocaleDateString()}.json`; a.click();
        }
        function startApp() { if (document.getElementById('pass-in').value === '0129') { localStorage.setItem('SF_LOGGED', 'true'); initData(); } else alert("PIN Error"); }
        function logout() { localStorage.removeItem('SF_LOGGED'); location.reload(); }
        function hardReset() { if (confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }
        if (localStorage.getItem('SF_LOGGED')) initData();
    </script>
</body>

</html>
