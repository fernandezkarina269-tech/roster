<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamArt V115 - DYNAMIC TEAMS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --bg: #f8fafc;
            --accent: #1e293b;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --border: #e2e8f0;
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 5px 15px -5px rgba(0, 0, 0, 0.03);
            --card-radius: 20px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--slate-900);
            padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .hidden { display: none !important; }

        /* LOGIN */
        #view-login {
            position: fixed; inset: 0; background: radial-gradient(circle at top right, #1e293b, #090e1a);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px; border-radius: 32px; text-align: center; width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6); color: white;
        }

        input, select, textarea {
            width: 100%; padding: 14px 18px; margin: 10px 0; background: #fff;
            border: 1px solid var(--border); border-radius: 14px; font-size: 14px;
            color: var(--slate-900); font-weight: 500; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none; box-sizing: border-box;
        }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        /* BUTTONS */
        .btn-main {
            padding: 16px 24px; width: 100%; background: linear-gradient(135deg, #FFD700, #FDB931);
            color: #000; border: none; font-weight: 800; cursor: pointer; border-radius: 14px;
            text-transform: uppercase; letter-spacing: 0.5px; margin-top: 15px; transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(253, 185, 49, 0.2);
        }
        .btn-main:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(253, 185, 49, 0.3); }

        .btn-nav { width: auto !important; padding: 10px 18px !important; margin: 0 !important; font-size: 13px !important; }

        /* NAV */
        .nav {
            background: #000; color: #fff; padding: 16px 30px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 4px solid var(--gold); position: sticky; top: 0; z-index: 1000;
        }

        /* POD CARDS & TABLES */
        .pod-card { background: white; border-radius: var(--card-radius); margin: 30px; box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--border); }
        .pod-header {
            padding: 18px 24px; font-weight: 800; font-size: 15px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; letter-spacing: -0.2px;
        }

        .table-wrap { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; table-layout: fixed; min-width: 1000px; }
        th {
            background: #0f172a; color: rgba(255, 255, 255, 0.9); padding: 14px 10px; font-size: 11px;
            text-transform: uppercase; font-weight: 800; letter-spacing: 0.8px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        td { padding: 16px 10px; text-align: center; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; transition: background 0.1s; }

        /* STICKY COLUMNS */
        .sc-sticky { position: sticky; z-index: 20; background: #fff !important; }
        .sc-1 { left: 0; border-right: 2px solid #cbd5e1; width: 100px; }

        th.sc-sticky { background: #0f172a !important; z-index: 30; }

        /* STATUS BADGES */
        .st-WORKING { color: #10b981; font-weight: 950; font-size: 16px; }
        .st-OFF { color: #f97316; font-weight: 800; font-size: 12px; }
        .st-SICK { color: #8b5cf6; font-weight: 800; font-size: 12px; }
        .st-ABSENT { color: #ef4444; font-weight: 900; font-size: 12px; }

        /* TABS */
        .shift-tabs {
            display: flex; background: #fff; padding: 12px 30px; gap: 12px; border-bottom: 1px solid var(--border);
            position: sticky; top: 72px; z-index: 900; align-items: center;
        }
        .shift-tab {
            padding: 10px 20px; cursor: pointer; border-radius: 12px; font-weight: 800; font-size: 13px;
            color: #64748b; transition: all 0.2s; border: 1px solid transparent; text-transform: uppercase;
        }
        .shift-tab.active { background: var(--slate-900); color: #fff; }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-box { background: white; padding: 40px; border-radius: 28px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.25); border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }

        /* MEMBER ROWS */
        .member-row { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
        .member-name { flex: 1; font-weight: 700; font-size: 13px; text-align: left; }
        .status-pill { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; border: 1px solid transparent; }
        .pill-WORKING { background: #dcfce7; color: #166534; }
        .pill-OFF { background: #ffedd5; color: #9a3412; }
        .pill-ABSENT { background: #fee2e2; color: #991b1b; }
        .pill-SICK { background: #f3e8ff; color: #6b21a8; }
    </style>
</head>

<body>

    <div id="view-login">
        <div class="login-card">
            <h1>ShiftFlow</h1>
            <p style="font-weight:900; color:#10b981; font-size:12px; text-transform:uppercase; letter-spacing:1px; margin-bottom:30px;">Dynamic Team Dashboard</p>
            <input type="password" id="pass-in" placeholder="ACCESS PIN">
            <button class="btn-main" onclick="startApp()">Enter System</button>
            <button class="btn-main" style="background:#fff; border:1px solid #ef4444; color:#ef4444; margin-top:15px; font-weight:700;" onclick="hardReset()">Factory Reset</button>
        </div>
    </div>

    <div id="view-app" class="hidden">
        <div class="nav">
            <div style="display:flex; align-items:center; gap:24px;">
                <div style="font-weight:950; letter-spacing:-0.5px; font-size:20px;">DREAMART</div>
                <div id="clock-display" style="font-family: 'JetBrains Mono', monospace; background:rgba(255,255,255,0.08); padding:6px 14px; border-radius:10px; font-size:14px; color:var(--gold); border: 1px solid rgba(255,255,255,0.1);">00:00:00</div>
            </div>
            <div style="display:flex; gap:12px;">
                <button class="btn-main btn-nav" style="background:#fff; color:#000;" onclick="downloadBackup()">📥 Backup</button>
                <button class="btn-main btn-nav btn-gold" onclick="askHistory()">📜 History</button>
                <button class="btn-main btn-nav btn-gold" onclick="showStats()">Statistics</button>
                <button class="btn-main btn-nav btn-gold" onclick="showAdd()">+ Member Pool</button>
                <button class="btn-main btn-nav" style="background:#ef4444; color:#fff;" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="shift-tabs">
            <div style="display:flex; gap:8px;">
                <div class="shift-tab active" onclick="setShift('1st')">1st Shift</div>
                <div class="shift-tab" onclick="setShift('2nd')">2nd Shift</div>
                <div class="shift-tab" onclick="setShift('3rd')">3rd Shift</div>
            </div>
            <div style="flex:1;"></div>
            <div style="display:flex; gap:8px;">
                <button class="shift-tab" onclick="moveView(-7)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">« Week</button>
                <button class="shift-tab" onclick="moveView(-1)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">‹</button>
                <button class="shift-tab" onclick="resetView()" style="background:#f8fafc; color:#0f172a; border:1px solid #e2e8f0; padding:8px 18px;">TODAY</button>
                <button class="shift-tab" onclick="moveView(1)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">›</button>
                <button class="shift-tab" onclick="moveView(7)" style="background:#fff; border:1px solid #e2e8f0; padding:8px 14px;">Week »</button>
            </div>
        </div>

        <div id="sheets-container" style="padding:0 10px;"></div>
    </div>

    <!-- TEAM ASSIGNMENT MODAL -->
    <div id="modal-team" class="modal hidden">
        <div class="modal-box">
            <h2 id="modal-team-title" style="margin-top:0; font-size:22px;">Team Assignment</h2>
            <p id="modal-team-date" style="font-size:12px; color:#64748b; font-weight:800; margin-bottom:20px;"></p>

            <div style="background:#fcfdfe; border:1px solid var(--border); padding:20px; border-radius:18px; margin-bottom:20px; text-align:left;">
                <label style="font-size:10px; font-weight:900; text-transform:uppercase; color:#64748b; margin-bottom:5px; display:block;">Model / Group Name:</label>
                <input type="text" id="team-model-input" placeholder="e.g. Gaby / Poison" style="margin:0; padding:12px;">
                
                <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">
                
                <label style="font-size:10px; font-weight:900; text-transform:uppercase; color:#64748b; margin-bottom:10px; display:block;">Assigned Members:</label>
                <div id="team-members-list"></div>
                
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <select id="team-emp-add" style="margin:0; font-size:12px; height:45px;"></select>
                    <button class="btn-main" style="width:auto; margin:0; height:45px; padding:0 15px;" onclick="addMemberToTeam()">+</button>
                </div>
                <button class="btn-main" style="background:#0f172a; color:#fff; margin-top:20px;" onclick="saveTeamChanges()">SAVE ALL TEAM CHANGES</button>
            </div>

            <div style="margin-top:25px; background:#f8fafc; border:1px solid var(--border); padding:20px; border-radius:18px;">
                <label style="font-size:11px; font-weight:800; text-transform:uppercase; color:#64748b; display:block; margin-bottom:10px;">Total Team Sales ($)</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="team-sale-amount" placeholder="0.00" style="margin:0;">
                    <button class="btn-main" style="width:auto; margin:0; background:var(--slate-900); white-space:nowrap;" onclick="saveTeamSale()">Save Sales</button>
                </div>
            </div>
            
            <div style="margin-top:25px; display:flex; gap:10px;">
                <button class="btn-main" style="border:none; background:#f1f5f9; color:#64748b; margin:0;" onclick="closeM()">Close</button>
                <button class="btn-main" style="border:none; background:#fef2f2; color:#ef4444; margin:0;" onclick="clearTeam()">Reset Team</button>
            </div>
        </div>
    </div>

    <!-- MEMBER POOL MODAL -->
    <div id="modal-add" class="modal hidden">
        <div class="modal-box">
            <h2 style="margin-top:0;">Member Master Pool</h2>
            <div id="member-pool-list" style="max-height:250px; overflow-y:auto; border:1px solid var(--border); border-radius:12px; margin-bottom:20px; text-align:left; background:#f8fafc;"></div>
            <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
            <input type="hidden" id="edit-id">
            <input type="text" id="add-name" placeholder="Full Name">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <select id="add-pod">
                    <option value="A">POD A</option>
                    <option value="B">POD B</option>
                    <option value="F">POD F</option>
                    <option value="BACKUP">BACKUP</option>
                </select>
                <select id="add-shift">
                    <option value="1st">1st Shift</option>
                    <option value="2nd">2nd Shift</option>
                    <option value="3rd">3rd Shift</option>
                </select>
            </div>
            <button class="btn-main" onclick="doAdd()">Save to Pool</button>
            <button id="btn-delete" class="btn-main hidden" style="background:#ef4444; margin-top:10px;" onclick="doDelete()">Delete Member</button>
            <button class="btn-main" style="margin-top:15px; border:none; background:#f1f5f9; color:#64748b;" onclick="closeM()">Close</button>
        </div>
    </div>

    <!-- STATS MODAL -->
    <div id="modal-stats" class="modal hidden">
        <div class="modal-box">
            <h2 style="margin-top:0;">System Statistics (Dynamic Grid)</h2>
            <div style="display:flex; gap:8px; margin-bottom:20px; justify-content:center;">
                <div class="shift-tab active" onclick="setStatsShift('ALL')" id="tab-all">All</div>
                <div class="shift-tab" onclick="setStatsShift('1st')" id="tab-1st">1st</div>
                <div class="shift-tab" onclick="setStatsShift('2nd')" id="tab-2nd">2nd</div>
                <div class="shift-tab" onclick="setStatsShift('3rd')" id="tab-3rd">3rd</div>
            </div>
            <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:16px; padding:15px; margin-bottom:20px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="date" id="stats-start">
                    <input type="date" id="stats-end">
                </div>
                <button class="btn-main" onclick="applyCustomStats()" style="margin-top:10px; font-size:12px;">Apply Filter</button>
            </div>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin-bottom:20px;">
                <div style="padding:15px 5px; background:#f0fdf4; border-radius:12px;"><div id="st-work" style="font-size:18px; font-weight:900; color:#16a34a;">0</div><div style="font-size:9px;">Work</div></div>
                <div style="padding:15px 5px; background:#fef2f2; border-radius:12px;"><div id="st-absent" style="font-size:18px; font-weight:900; color:#dc2626;">0</div><div style="font-size:9px;">Abs</div></div>
                <div style="padding:15px 5px; background:#f5f3ff; border-radius:12px;"><div id="st-sick" style="font-size:18px; font-weight:900; color:#7c3aed;">0</div><div style="font-size:9px;">Sick</div></div>
                <div style="padding:15px 5px; background:#fff7ed; border-radius:12px;"><div id="st-off" style="font-size:18px; font-weight:900; color:#ea580c;">0</div><div style="font-size:9px;">Off</div></div>
            </div>
            <div style="height:200px; margin-bottom:20px; border:1px solid var(--border); border-radius:12px; padding:10px;"><canvas id="salesChart"></canvas></div>
            <div id="st-sales-total" style="font-size:32px; font-weight:950;">$0.00</div>
            <button class="btn-main" style="margin-top:20px; background:var(--slate-900); color:#fff;" onclick="closeM()">Close</button>
        </div>
    </div>

    <!-- HISTORY MODAL -->
    <div id="modal-history" class="modal hidden">
        <div class="modal-box">
            <h2 style="margin-top:0;">Change History Log</h2>
            <div id="hist-list" style="max-height: 400px; overflow-y: auto; background: #fff; border:1px solid var(--border); border-radius:16px;"></div>
            <button class="btn-main" style="background:var(--slate-900); color:#fff; margin-top:20px;" onclick="closeM()">Close History</button>
        </div>
    </div>

    <script>
        let db = { emps: [], grid: {}, history: [], config: { teamCounts: { 'POD A': 12, 'POD B': 10, 'POD F': 6, 'BACKUP': 4 } } };
        let activeTeam = null;
        let currentShift = '1st';
        let statsShift = 'ALL';
        let statsRange = { start: null, end: null };
        let viewOffset = parseInt(localStorage.getItem('SF_VIEW_OFFSET')) || -2;

        const save = () => { localStorage.setItem('SF_V115_DYNAMIC', JSON.stringify(db)); render(); };
        const saveSilent = () => { localStorage.setItem('SF_V115_DYNAMIC', JSON.stringify(db)); };
        const closeM = () => { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); };

        function logAction(desc) {
            if (!db.history) db.history = [];
            const item = { time: new Date().toLocaleString(), user: "Karina", desc };
            db.history.unshift(item);
            if (db.history.length > 500) db.history = db.history.slice(0, 500);
            saveSilent();
        }

        function askHistory() { if (prompt("PIN:") === '0129') { showHistory(); } }
        function showHistory() {
            const list = document.getElementById('hist-list');
            list.innerHTML = db.history?.length ? '' : '<div style="padding:40px; color:#94a3b8;">No records</div>';
            db.history.forEach(h => { list.innerHTML += `<div class="hist-item"><span class="hist-time">${h.time}</span><div class="hist-desc"><span class="hist-user">${h.user}:</span> ${h.desc}</div></div>`; });
            document.getElementById('modal-history').classList.remove('hidden');
        }

        // GRID 
        function openTeamM(pod, idx, date) {
            activeTeam = { pod, idx, date, shift: currentShift };
            const data = db.grid[date]?.[currentShift]?.[pod]?.[idx] || { model: "", members: [], sale: 0 };
            document.getElementById('modal-team-title').innerText = `${pod} - Team ${idx + 1}`;
            document.getElementById('modal-team-date').innerText = `Date: ${date}`;
            document.getElementById('team-model-input').value = data.model || "";
            document.getElementById('team-sale-amount').value = data.sale || "";
            const sel = document.getElementById('team-emp-add');
            sel.innerHTML = '<option value="">-- Select Member --</option>';
            db.emps.sort((a,b) => a.name.localeCompare(b.name)).forEach(e => sel.add(new Option(e.name, e.id)));
            renderTeamMembers(data.members || []);
            document.getElementById('modal-team').classList.remove('hidden');
        }

        function renderTeamMembers(members) {
            const list = document.getElementById('team-members-list');
            list.innerHTML = members.length ? '' : '<div style="padding:10px; color:#94a3b8; font-size:12px; text-align:center;">No members</div>';
            members.forEach((m, i) => {
                const emp = db.emps.find(e => e.id == m.id);
                const row = document.createElement('div');
                row.className = 'member-row';
                row.innerHTML = `
                    <div class="member-name">${emp ? emp.name : "Unknown"}</div>
                    <div class="status-pill pill-${m.status}" onclick="cycleStatus(${i})">${m.status === 'WORKING' ? '✓' : m.status}</div>
                    <button style="border:none; background:none; color:#ef4444; font-weight:800; cursor:pointer;" onclick="removeMemberFromTeam(${i})">✕</button>
                `;
                list.appendChild(row);
            });
        }

        function getOrCreateTeamData() {
            const { date, shift, pod, idx } = activeTeam;
            if(!db.grid[date]) db.grid[date] = {};
            if(!db.grid[date][shift]) db.grid[date][shift] = {};
            if(!db.grid[date][shift][pod]) db.grid[date][shift][pod] = {};
            if(!db.grid[date][shift][pod][idx]) db.grid[date][shift][pod][idx] = { model: "", members: [], sale: 0 };
            return db.grid[date][shift][pod][idx];
        }

        function addMemberToTeam() {
            const id = document.getElementById('team-emp-add').value;
            if(!id) return;
            const data = getOrCreateTeamData();
            if(!data.members) data.members = [];
            if(data.members.find(m => m.id == id)) return;
            data.members.push({ id, status: 'WORKING' });
            renderTeamMembers(data.members);
        }

        function saveTeamChanges() {
            const data = getOrCreateTeamData();
            data.model = document.getElementById('team-model-input').value;
            logAction(`Saved Team: ${activeTeam.pod} T${activeTeam.idx+1} (${data.model})`);
            save(); alert("Saved!");
        }

        function cycleStatus(i) {
            const states = ['WORKING', 'OFF', 'ABSENT', 'SICK'];
            const members = getOrCreateTeamData().members;
            members[i].status = states[(states.indexOf(members[i].status) + 1) % states.length];
            renderTeamMembers(members);
        }

        function removeMemberFromTeam(i) { getOrCreateTeamData().members.splice(i, 1); renderTeamMembers(getOrCreateTeamData().members); }

        function saveTeamSale() {
            const data = getOrCreateTeamData();
            data.sale = parseFloat(document.getElementById('team-sale-amount').value) || 0;
            logAction(`Saved Sale: ${activeTeam.pod} T${activeTeam.idx+1} -> $${data.sale}`);
            save(); alert("Sale Saved!");
        }

        function clearTeam() {
            if(confirm("Clear team?")) {
                const { date, shift, pod, idx } = activeTeam;
                delete db.grid[date][shift][pod][idx];
                save(); closeM();
            }
        }

        function adjustTeams(pod, delta) {
            db.config.teamCounts[pod] = Math.max(1, (db.config.teamCounts[pod] || 0) + delta);
            save();
        }

        // POOL 
        function updatePoolList() {
            const list = document.getElementById('member-pool-list');
            list.innerHTML = "";
            db.emps.sort((a,b) => a.name.localeCompare(b.name)).forEach(e => {
                const div = document.createElement('div');
                div.style = "padding:10px 15px; border-bottom:1px solid #e2e8f0; font-size:12px; cursor:pointer;";
                div.innerHTML = `<strong>${e.name}</strong> <span style="font-size:10px; color:#64748b;">(${e.pod})</span>`;
                div.onclick = () => editMember(e.id);
                list.appendChild(div);
            });
        }
        function showAdd() { document.getElementById('edit-id').value = ""; document.getElementById('add-name').value = ""; updatePoolList(); document.getElementById('modal-add').classList.remove('hidden'); }
        function doAdd() {
            const n = document.getElementById('add-name').value;
            const eid = document.getElementById('edit-id').value;
            const obj = { id: eid ? parseInt(eid) : Date.now(), name: n, pod: document.getElementById('add-pod').value, shift: document.getElementById('add-shift').value };
            if (eid) db.emps[db.emps.findIndex(e => e.id == eid)] = obj;
            else db.emps.push(obj);
            save(); updatePoolList();
        }
        function editMember(id) {
            const e = db.emps.find(x => x.id == id);
            document.getElementById('edit-id').value = e.id; document.getElementById('add-name').value = e.name;
            document.getElementById('btn-delete').classList.remove('hidden');
        }
        function doDelete() { db.emps = db.emps.filter(emp => emp.id != document.getElementById('edit-id').value); save(); updatePoolList(); }

        // RENDERING
        function setShift(s) { currentShift = s; render(); }
        function moveView(n) { viewOffset += n; localStorage.setItem('SF_VIEW_OFFSET', viewOffset); render(); }
        function resetView() { viewOffset = -2; localStorage.setItem('SF_VIEW_OFFSET', viewOffset); render(); }

        function render() {
            const container = document.getElementById('sheets-container');
            container.innerHTML = ''; const days = getViewDays();
            const todayStr = `${new Date().getDate()}/${new Date().getMonth() + 1}`;
            
            document.querySelectorAll('.shift-tab').forEach(t => t.classList.remove('active'));
            const tabs = document.querySelectorAll('.shift-tab');
            const shiftIdx = currentShift === '1st' ? 0 : currentShift === '2nd' ? 1 : 2;
            tabs[shiftIdx].classList.add('active');

            const makePodTable = (podTitle, color) => {
                const count = db.config.teamCounts[podTitle] || 5;
                let html = `
                <div class="pod-card">
                    <div class="pod-header" style="background:${color}15; color:${color};">
                        <strong>${podTitle}</strong>
                        <div style="display:flex; gap:5px;">
                            <button onclick="adjustTeams('${podTitle}', -1)">-</button>
                            <span style="font-size:11px;">${count} Teams</span>
                            <button onclick="adjustTeams('${podTitle}', 1)">+</button>
                        </div>
                    </div>
                    <div class="table-wrap">
                        <table><thead><tr>
                            <th class="sc-sticky sc-1">Unit</th>
                            ${days.map(d => `<th style="${d === todayStr ? 'background:#f97316;' : ''}">${d}</th>`).join('')}
                        </tr></thead><tbody>`;

                for (let i = 0; i < count; i++) {
                    html += `<tr><td class="sc-sticky sc-1">Team ${i + 1}</td>`;
                    days.forEach(d => {
                        const data = db.grid[d]?.[currentShift]?.[podTitle]?.[i] || { model: "", members: [], sale: 0 };
                        const membersHtml = (data.members || []).map(m => {
                            const emp = db.emps.find(e => e.id == m.id);
                            return `<div style="font-size:11px; font-weight:900;">${emp ? emp.name : "?"} <span class="st-${m.status}">${m.status === 'WORKING' ? '✓' : m.status}</span></div>`;
                        }).join('') || '<span style="color:#cbd5e1;">(Empty)</span>';

                        html += `<td onclick="openTeamM('${podTitle}', ${i}, '${d}')" style="cursor:pointer; ${d === todayStr ? 'background:#fff7ed;' : ''}">
                            <div style="font-size:10px; color:#3b82f6; font-weight:800;">${data.model || ""}</div>
                            ${membersHtml}
                            ${data.sale ? `<div style="color:#10b981; font-size:11px;">$${data.sale}</div>` : ""}
                        </td>`;
                    });
                    html += `</tr>`;
                }
                container.innerHTML += html + '</tbody></table></div></div>';
            };

            makePodTable('POD A', '#3b82f6');
            makePodTable('POD B', '#22c55e');
            makePodTable('POD F', '#ef4444');
            makePodTable('BACKUP', '#f59e0b');
        }

        // UTILS
        function getViewDays() {
            const days = []; for (let i = 0; i < 7; i++) {
                const d = new Date(); d.setDate(d.getDate() + viewOffset + i);
                days.push(`${d.getDate()}/${d.getMonth() + 1}`);
            } return days;
        }

        function updateStatsData() {
            let w = 0, a = 0, s = 0, o = 0, rev = 0;
            const startStr = document.getElementById('stats-start').value;
            const endStr = document.getElementById('stats-end').value;
            const startD = startStr ? new Date(startStr + 'T00:00:00') : null;
            const endD = endStr ? new Date(endStr + 'T23:59:59') : null;

            Object.entries(db.grid).forEach(([dayKey, dayData]) => {
                // Simplified date check for stats
                Object.entries(dayData).forEach(([shift, pods]) => {
                    if (statsShift !== 'ALL' && shift !== statsShift) return;
                    Object.values(pods).forEach(teams => {
                        Object.values(teams).forEach(team => {
                            rev += (team.sale || 0);
                            (team.members || []).forEach(m => {
                                if(m.status === 'WORKING') w++; else if(m.status === 'ABSENT') a++; else if(m.status === 'SICK') s++; else if(m.status === 'OFF') o++;
                            });
                        });
                    });
                });
            });
            document.getElementById('st-work').innerText = w; document.getElementById('st-absent').innerText = a; 
            document.getElementById('st-sick').innerText = s; document.getElementById('st-off').innerText = o;
            document.getElementById('st-sales-total').innerText = `$${rev.toLocaleString()}`;
        }
        function showStats() { updateStatsData(); document.getElementById('modal-stats').classList.remove('hidden'); }
        function setStatsShift(s) { statsShift = s; updateStatsData(); }
        function downloadBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const a = document.createElement('a'); a.href = dataStr; a.download = `ShiftFlow_Backup.json`; a.click();
        }
        function updateClock() { document.getElementById('clock-display').innerText = new Date().toLocaleTimeString(); }
        function startApp() { if(document.getElementById('pass-in').value === '0129') { localStorage.setItem('SF_LOGGED', '1'); initData(); } }
        function logout() { localStorage.removeItem('SF_LOGGED'); location.reload(); }
        function initData() {
            const saved = localStorage.getItem('SF_V115_DYNAMIC');
            if(saved) db = JSON.parse(saved);
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-app').classList.remove('hidden');
            setInterval(updateClock, 1000); render();
        }
        if(localStorage.getItem('SF_LOGGED')) initData();
    </script>
</body>
</html>
